let openPopupAyah=null;

// Single source of truth for a tag-popup node (used by open + refresh)
function popupNodeHTML(node,anc,aid,current){
  const path=tagPath(anc,node.name);
  const has=node.children?.length>0;
  const isOn=current.includes(path);
  const isOpen=!collapsedG["tp_"+path];
  let h=`<div class="tp-node">
    <div class="tp-row" onclick="popupToggleTag(${aid},'${escAttr(path)}')">
      <span class="tp-arrow" onclick="event.stopPropagation();collapsedG['tp_${escAttr(path)}']=!collapsedG['tp_${escAttr(path)}'];refreshTagPopup(${aid})">${has?(isOpen?'▼':'▶'):' '}</span>
      <span class="tp-check">${isOn?'☑':'☐'}</span>
      <span style="flex:1">${esc(node.name)}</span>
    </div>`;
  if(has&&isOpen)h+=node.children.map(ch=>popupNodeHTML(ch,[...anc,node.name],aid,current)).join("");
  return h+"</div>";
}

function openTagPopup(aid,btnEl){
  closeTagPopup();
  openPopupAyah=aid;

  const tree=getTagTree();
  if(!tree.length){alert("Создайте теги в боковой панели (☰ → Теги)");return;}

  const current=getATList(ST.surah,aid);

  const rect=btnEl.getBoundingClientRect();
  const popup=document.createElement("div");
  popup.className="tag-popup";
  popup.id="tagPopup";
  popup.style.position="fixed";
  popup.style.top=Math.min(rect.bottom+4,window.innerHeight-310)+"px";
  popup.style.left=Math.min(rect.left,window.innerWidth-270)+"px";
  popup.innerHTML=`<div class="tag-popup-head"><span>🏷 Теги · аят ${aid}</span><button class="tag-popup-close" onclick="closeTagPopup()">✕</button></div>
    <div class="tag-popup-list">${tree.map(n=>popupNodeHTML(n,[],aid,current)).join("")}</div>`;
  document.body.appendChild(popup);

  setTimeout(()=>document.addEventListener("click",closeOnOutside),10);
}

function closeOnOutside(e){
  const popup=document.getElementById("tagPopup");
  if(!popup)return;
  if(popup.contains(e.target))return;
  if(e.target.closest("[onclick*='openTagPopup']"))return;
  closeTagPopup();
}

function closeTagPopup(){
  const popup=document.getElementById("tagPopup");
  if(popup)popup.remove();
  openPopupAyah=null;
  document.removeEventListener("click",closeOnOutside);
}

function popupToggleTag(aid,path){
  event.stopPropagation();
  toggleAT(ST.surah,aid,path);
  refreshTagPopup(aid);
}

function refreshTagPopup(aid){
  const popup=document.getElementById("tagPopup");
  if(!popup)return;
  const tree=getTagTree();
  const current=getATList(ST.surah,aid);
  const listEl=popup.querySelector(".tag-popup-list");
  if(listEl)listEl.innerHTML=tree.map(n=>popupNodeHTML(n,[],aid,current)).join("");
}

// Tag management
function addTag(val){
  if(!val.trim())return;
  const parts=val.split("/").map(s=>s.trim()).filter(Boolean);
  const tree=getTagTree();let cur=tree;
  for(const p of parts){let f=cur.find(n=>n.name===p);if(!f){f={name:p,children:[]};cur.push(f);}cur=f.children;}
  setTagTree(tree);renderSB();
}
function selectTag(path){ST.selectedTag=path;if(isM()){ST.sidebarOpen=false;document.getElementById("sidebar").classList.add("collapsed");}render();}
function renameTag(path){
  const parts=path.split("/");const oldName=parts[parts.length-1];
  const newName=prompt("Новое название:",oldName);
  if(!newName||!newName.trim()||newName===oldName)return;
  const tree=getTagTree();
  function findNode(arr,idx){
    const n=arr.find(x=>x.name===parts[idx]);
    if(!n)return null;
    if(idx===parts.length-1)return n;
    return findNode(n.children,idx+1);
  }
  const node=findNode(tree,0);
  if(node){
    const newPath=parts.slice(0,-1).concat(newName.trim()).join("/");
    // Update tag assignments
    const at=getAyahTags();
    for(const k in at){at[k]=at[k].map(p=>p===path?newPath:p.startsWith(path+"/")?newPath+p.slice(path.length):p);}
    setAyahTags(at);
    node.name=newName.trim();
    setTagTree(tree);
    if(ST.selectedTag===path)ST.selectedTag=newPath;
    render();
  }
}
function moveTag(path,dir){
  const parts=path.split("/");
  const tree=getTagTree();
  let arr=tree;
  for(let i=0;i<parts.length-1;i++){const n=arr.find(x=>x.name===parts[i]);if(!n)return;arr=n.children;}
  const idx=arr.findIndex(x=>x.name===parts[parts.length-1]);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=arr.length)return;
  [arr[idx],arr[newIdx]]=[arr[newIdx],arr[idx]];
  setTagTree(tree);renderSB();
}
function deleteTag(path){
  if(!confirm("Удалить «"+path+"»?"))return;
  const parts=path.split("/");const tree=getTagTree();
  let arr=tree;
  for(let i=0;i<parts.length-1;i++){const n=arr.find(x=>x.name===parts[i]);if(!n)return;arr=n.children;}
  const idx=arr.findIndex(x=>x.name===parts[parts.length-1]);
  if(idx>=0)arr.splice(idx,1);
  setTagTree(tree);
  const at=getAyahTags();for(const k in at){at[k]=at[k].filter(t=>t!==path&&!t.startsWith(path+"/"));if(!at[k].length)delete at[k];}
  setAyahTags(at);
  if(ST.selectedTag===path)ST.selectedTag=null;
  render();
}

// Fullscreen: hide the button where the API is unavailable (e.g. iOS Safari),
// and keep its state in sync when the user exits via the system gesture/Esc.
if(!(document.fullscreenEnabled||document.webkitFullscreenEnabled)){
  const fb=document.getElementById("fsBtn");if(fb)fb.style.display="none";
}
document.addEventListener("fullscreenchange",syncFsBtn);
document.addEventListener("webkitfullscreenchange",syncFsBtn);
// word/grammar cards: open on tap of a [[…]] word OR a word with data-loc
// (corpus card), dismiss on outside tap/scroll
document.addEventListener("click",e=>{
  if(!(e.target.closest))return;
  // a word carrying an address → grammar card from the corpus (lazy-loaded).
  // skip when the user is selecting text so copying isn't interrupted.
  const loc=e.target.closest("[data-loc]");
  if(loc&&(window.getSelection?window.getSelection().isCollapsed:true)){openMorphCard(loc);return;}
  const w=e.target.closest(".wcard");
  if(w){showWordCard(w);return;}
  if(!e.target.closest("#wordCard"))hideWordCard();
});
document.addEventListener("scroll",hideWordCard,true);
// Open sidebar by default on desktop
if(!isM()){ST.sidebarOpen=true;document.getElementById("sidebar").classList.remove("collapsed");}
loadConfig();
