<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>مكتبة التفاسير — Библиотека тафсиров</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* Reem Kufi (SIL OFL) — self-hosted for offline; see fonts/ReemKufi-OFL.txt */
@font-face{font-family:'Reem Kufi';font-style:normal;font-weight:400 700;font-display:swap;src:url('fonts/ReemKufi.woff2') format('woff2')}
/* KFGQPC Uthmanic Hafs — почерк Усмана Таха из мусхафа Мадани (self-hosted) */
@font-face{font-family:'KFGQPC Uthmanic';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/UthmanicHafs.woff2') format('woff2')}
/* Amiri Quran (SIL OFL) — открытый мусхафный насх (self-hosted) */
@font-face{font-family:'Amiri Quran';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/AmiriQuran.woff2') format('woff2')}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ===== THEMES ===== */
[data-theme="green"]{--accent:#1B5E3B;--accent-bg:#E8F3EC;--accent-hover:#24794E;--header-bg:#14331F;--header-text:#EDE8DD}
[data-theme="blue"]{--accent:#1B4E8E;--accent-bg:#E3EDF8;--accent-hover:#2868B0;--header-bg:#132D4F;--header-text:#E0E8F0}
[data-theme="gold"]{--accent:#8B6914;--accent-bg:#FDF5E6;--accent-hover:#A67C1A;--header-bg:#3D2E0A;--header-text:#F0E8D0}
[data-theme="dark"]{--accent:#5DA87E;--accent-bg:#1E2E24;--accent-hover:#6FC090;--header-bg:#0D0D0D;--header-text:#C8C8C0;--bg:#1A1A18;--bg-alt:#222220;--bg-card:#2A2A28;--border:#3A3A36;--border-light:#333330;--text:#D8D4CC;--text-sec:#AAA89E;--text-muted:#706E66}

:root,[data-theme="green"],[data-theme="blue"],[data-theme="gold"]{
  --bg:#FAF8F5;--bg-alt:#F0EDE6;--bg-card:#fff;--border:#E5E0D8;--border-light:#E8E3DA;
  --text:#2D2A26;--text-sec:#5A5650;--text-muted:#AAA59C;
  --note-bg:#FFFBF0;--note-border:#E8D8A0;--note-color:#9E7C20;
  --tag-bg:#EDE7F6;--tag-color:#5E35B1;
  --sidebar-w:240px;
}
[data-theme="dark"]{--note-bg:#2A2818;--note-border:#4A4520;--note-color:#C8A830;--tag-bg:#2A2440;--tag-color:#9E8DE0}

body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-user-select:none;user-select:none}
.selectable{-webkit-user-select:text;user-select:text}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* HEADER */
.header{background:var(--header-bg);color:var(--header-text);padding:7px 12px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.2);z-index:20;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:10px}
.h-title{font-size:16px;font-weight:600;font-family:'Amiri',serif}
.h-sub{font-size:9px;opacity:.5;letter-spacing:1.5px}
.h-right{display:flex;align-items:center;gap:6px}
.btn-i{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:inherit;border-radius:6px;padding:5px 9px;cursor:pointer;font-size:13px;transition:background .12s}
.btn-i:hover{background:rgba(255,255,255,.15)}
.btn-i.active{background:rgba(255,255,255,.22)}
.theme-dots{display:flex;gap:4px;align-items:center}
.theme-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border .15s}
.theme-dot:hover,.theme-dot.active{border-color:rgba(255,255,255,.7)}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden;position:relative}

/* SIDEBAR — surah list */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg-alt);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:margin-left .25s;z-index:5}
.sidebar.collapsed{margin-left:calc(var(--sidebar-w)*-1)}
.sb-head{padding:7px 8px 5px;border-bottom:1px solid var(--border)}
.sb-head input{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:5px;font-size:12px;background:var(--bg-card);outline:none;font-family:inherit;color:var(--text)}
.sb-head input:focus{border-color:var(--accent)}
.sb-tabs{display:flex;border-bottom:1px solid var(--border)}
.sb-tab{flex:1;padding:6px 4px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;color:var(--text-sec);border-bottom:2px solid transparent;text-align:center}
.sb-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.sb-content{flex:1;overflow-y:auto;padding:4px 5px 10px}

.surah-btn{width:100%;display:flex;align-items:center;gap:7px;padding:6px 7px;margin:1px 0;border:none;border-radius:5px;cursor:pointer;background:transparent;color:var(--text);text-align:left;font-family:inherit;font-size:12px;transition:background .12s}
.surah-btn:hover{background:rgba(128,128,128,.08)}.surah-btn.active{background:var(--accent);color:#fff}
.s-n{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:calc(9px*var(--sb,1));font-weight:600;background:rgba(128,128,128,.1);flex-shrink:0}
.surah-btn.active .s-n{background:rgba(255,255,255,.18)}
.s-ar{font-family:'Amiri',serif;font-size:calc(13px*var(--sb,1));direction:rtl;line-height:1.3}
.s-meta{font-size:calc(9px*var(--sb,1));opacity:.5;margin-top:1px}

/* TAG TREE in sidebar */
.tag-node{padding-left:10px}
.tag-row{display:flex;align-items:center;gap:3px;padding:4px 5px;border-radius:4px;cursor:pointer;font-size:11px;transition:background .1s}
.tag-row:hover{background:rgba(128,128,128,.08)}
.tag-row.selected{background:var(--tag-bg);color:var(--tag-color);font-weight:600}
.tag-arrow{font-size:8px;width:12px;text-align:center;color:var(--text-muted);cursor:pointer;flex-shrink:0}
.tag-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag-cnt{font-size:9px;color:var(--text-muted)}
.tag-acts{display:flex;gap:1px;opacity:0;transition:opacity .12s}
.tag-row:hover .tag-acts{opacity:1}
.tag-ab{background:none;border:none;cursor:pointer;font-size:10px;padding:1px 3px;border-radius:3px;color:var(--text-muted)}
.tag-ab:hover{background:rgba(128,128,128,.15);color:var(--text)}
.tag-add-row{padding:6px 8px;border-top:1px solid var(--border)}
.tag-add-row input{width:100%;padding:5px 7px;border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit;outline:none;color:var(--text);background:var(--bg-card)}
.tag-add-hint{font-size:9px;color:var(--text-muted);margin-top:3px}

/* CENTER */
.center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.center-bar{padding:6px 12px;border-bottom:1px solid var(--border);background:var(--bg-card);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:6px;flex-wrap:wrap}
.cb-left{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cb-left h2{font-size:13px;font-weight:500;margin:0}
.cb-left .ar{font-family:'Amiri',serif;margin-left:5px;font-size:15px}
.cb-right{display:flex;align-items:center;gap:6px}
.btn-s{background:var(--bg-alt);border:1px solid var(--border);border-radius:4px;padding:3px 8px;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;color:var(--text)}
.btn-s:hover{background:var(--border)}
.btn-s.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:600}

/* RIGHT PANEL — flyout for choosing translations & tafsirs */
.rpanel{position:fixed;top:0;right:0;height:100%;height:100dvh;width:330px;max-width:88vw;background:var(--bg-card);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:45;transform:translateX(0);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:-6px 0 30px rgba(0,0,0,.16)}
.rpanel.collapsed{transform:translateX(100%)}
.panel-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.32);opacity:0;pointer-events:none;transition:opacity .25s;z-index:44}
.panel-backdrop.show{opacity:1;pointer-events:auto}
.rp-head{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--accent);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rp-list{flex:1;overflow-y:auto;padding:4px 0}

/* Facet filter bar */
.rp-facets{padding:6px 10px 8px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.facet-axis{display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.facet-axis-lbl{font-size:9px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--text-muted);width:74px;flex-shrink:0}
.facet-chip{font-family:inherit;font-size:10px;padding:2px 8px;border:1px solid var(--border);border-radius:11px;background:var(--bg);color:var(--text-sec);cursor:pointer;transition:all .12s;white-space:nowrap}
.facet-chip:hover{border-color:var(--accent)}
.facet-chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.facet-reset{align-self:flex-start;font-family:inherit;font-size:10px;color:var(--accent);background:none;border:none;cursor:pointer;padding:1px 0;margin-top:1px}
.rp-sec-head{padding:7px 12px 3px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted)}
.t-meta{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.t-pill{font-size:8px;line-height:1.4;padding:0 5px;border-radius:6px;background:var(--tag-bg);color:var(--tag-color);white-space:nowrap}

.tg-head{display:flex;align-items:center;gap:5px;padding:6px 8px 4px;font-size:10px;font-weight:600;color:var(--text-sec);letter-spacing:.3px;cursor:pointer;background:var(--bg);border:none;width:100%;text-align:left;font-family:inherit;position:sticky;top:0;z-index:1}
.tg-head:hover{background:var(--border-light)}
.tg-icon{font-size:12px}
.tg-arrow{margin-left:auto;font-size:8px;color:var(--text-muted);transition:transform .2s}
.tg.collapsed .tg-arrow{transform:rotate(-90deg)}.tg.collapsed .tg-items{display:none}

.t-item{display:flex;align-items:center;gap:6px;width:100%;padding:5px 8px 5px 14px;border:none;background:transparent;cursor:pointer;text-align:left;font-family:inherit;transition:background .1s}
.t-item:hover{background:rgba(128,128,128,.06)}
.t-check{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .12s;color:transparent}
.t-item.checked .t-check{background:var(--accent);border-color:var(--accent);color:#fff}
.t-info{flex:1;min-width:0}
.t-name{font-size:calc(11px*var(--sb,1));font-weight:500;color:var(--text);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-item.checked .t-name{color:var(--accent);font-weight:600}
.t-ar{font-family:'Amiri',serif;font-size:calc(11px*var(--sb,1));color:var(--text-muted);direction:rtl;line-height:1.1}
.t-item.special{border-left:3px solid var(--note-color);padding-left:11px}
.t-item.arabic-item{border-left:3px solid var(--accent);padding-left:11px}

/* READING AREA */
.reading{flex:1;overflow-y:auto;padding:12px calc(16px + var(--mar,0px))}

/* Horizontal layout */
.ayah-block{margin-bottom:14px;border:1px solid var(--border-light);border-radius:8px;overflow:hidden;background:var(--bg-card)}
.ab-head{padding:6px 10px;background:var(--bg-alt);border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.ab-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.ab-tag-dots{display:flex;gap:3px}
.ab-tag-dot{width:6px;height:6px;border-radius:50%;background:var(--tag-color)}
.ab-note-dot{width:6px;height:6px;border-radius:50%;background:var(--note-color)}

.ab-entry{padding:8px 12px;border-bottom:1px solid var(--border-light)}
.ab-entry:last-child{border-bottom:none}
.ab-entry-label{font-size:10px;font-weight:600;color:var(--accent);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.ab-entry-label .lbl-ar{font-family:'Amiri',serif;color:var(--text-muted);font-weight:400}
.ab-entry-text{font-size:calc(13px*var(--rs-ru,1));line-height:calc(1.85*var(--lh-ru,1));color:var(--text-sec);white-space:pre-wrap}
.ab-entry-text.selectable{-webkit-user-select:text;user-select:text}
.ab-entry-text.rtl{direction:rtl;text-align:right;font-family:'Noto Naskh Arabic','Amiri',serif;font-size:calc(17px*var(--rs-ar,1));line-height:calc(2*var(--lh-ar,1));color:var(--text)}
.ab-entry-text.arabic-main{font-family:'Noto Naskh Arabic','Amiri',serif;font-size:calc(22px*var(--rs-ar,1));line-height:calc(2*var(--lh-ar,1));direction:rtl;text-align:right;color:var(--text)}
/* Markdown-rendered tafsir/translation (tables, bold, quotes, lists) */
.md{white-space:normal}
.md .md-p{margin:.15em 0;white-space:pre-line}
.md .md-h{font-weight:600;margin:.45em 0 .2em;color:var(--text)}
.md .md-h1{font-size:1.2em}.md .md-h2{font-size:1.1em}.md .md-h3,.md .md-h4{font-size:1.03em}
.md .md-q{border-inline-start:3px solid var(--accent);padding-inline-start:9px;margin:.35em 0;color:var(--text-muted)}
.md .md-ul,.md .md-ol{margin:.3em 0;padding-inline-start:1.3em}
.md .md-ul li,.md .md-ol li{margin:.1em 0}
.md .md-tbl{border-collapse:collapse;margin:.45em 0;width:auto;max-width:100%}
.md .md-tbl th,.md .md-tbl td{border:1px solid var(--border);padding:3px 8px;text-align:start;vertical-align:top}
.md .md-tbl th{background:var(--bg-alt);font-weight:600}
.md code{background:var(--bg-alt);border-radius:3px;padding:0 4px;font-size:.92em}
.md hr{border:none;border-top:1px solid var(--border);margin:.5em 0}
.clamped{max-height:calc(9em*var(--lh-ru,1));overflow:hidden;-webkit-mask-image:linear-gradient(180deg,#000 70%,transparent);mask-image:linear-gradient(180deg,#000 70%,transparent)}
.more-btn{background:none;border:none;color:var(--accent);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;padding:4px 0 2px}
/* tap-to-open word/grammar cards */
.wcard{display:inline;font:inherit;color:inherit;background:none;border:none;padding:0;cursor:pointer;border-bottom:1px dotted var(--accent)}
.wcard:active{background:var(--accent);color:#fff}
.word-card{position:fixed;z-index:80;max-width:300px;background:var(--bg-card);border:1px solid var(--border);border-radius:9px;box-shadow:0 8px 34px rgba(0,0,0,.28);padding:9px 12px;font-size:13px;line-height:1.5;color:var(--text);display:none}

/* Notes inline */
.ab-note-area{width:100%;border:1px solid var(--note-border);border-radius:5px;padding:6px 8px;font-family:inherit;font-size:12px;line-height:1.6;color:var(--text);background:var(--note-bg);resize:vertical;outline:none;min-height:40px;-webkit-user-select:text;user-select:text}
.ab-note-area:focus{border-color:var(--note-color)}

/* Vertical/column layout */
.col-layout{display:flex;overflow-x:auto;gap:0;padding:0 var(--mar,0px)}
.col-col{flex:1;min-width:250px;border-right:1px solid var(--border-light)}
.col-col:last-child{border-right:none}
.col-head{padding:6px 8px;background:var(--bg-alt);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--accent);position:sticky;top:0;z-index:1;text-align:center}
.col-ayah{padding:8px 10px;border-bottom:1px solid var(--border-light);font-size:calc(13px*var(--rs-ru,1));line-height:calc(1.85*var(--lh-ru,1));color:var(--text-sec);white-space:pre-wrap;min-height:50px}
.col-ayah.rtl{direction:rtl;text-align:right;font-family:'Noto Naskh Arabic','Amiri',serif;font-size:calc(16px*var(--rs-ar,1));line-height:calc(2*var(--lh-ar,1));color:var(--text)}
.col-ayah.arabic-main{font-family:'Noto Naskh Arabic','Amiri',serif;font-size:calc(20px*var(--rs-ar,1));line-height:calc(2*var(--lh-ar,1));direction:rtl;text-align:right;color:var(--text)}
.col-ayah-num{font-size:9px;font-weight:600;color:var(--accent);margin-bottom:2px}

/* TAG RESULTS view */
.tag-results{flex:1;overflow-y:auto;padding:12px 16px}

/* Tag popup on ayah */
.tag-popup{z-index:30;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.15);width:260px;max-height:300px;display:flex;flex-direction:column;overflow:hidden}
.tag-popup-head{padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--tag-color);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.tag-popup-close{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-muted);padding:0 2px}
.tag-popup-list{flex:1;overflow-y:auto;padding:4px 0}
.tp-node{padding-left:10px}
.tp-row{display:flex;align-items:center;gap:4px;padding:3px 8px;cursor:pointer;font-size:11px;border-radius:3px;transition:background .1s}
.tp-row:hover{background:rgba(128,128,128,.08)}
.tp-check{font-size:10px;width:14px;flex-shrink:0;color:var(--tag-color)}
.tp-arrow{font-size:7px;width:10px;text-align:center;color:var(--text-muted);cursor:pointer;flex-shrink:0}
.tr-header{font-size:14px;font-weight:600;color:var(--tag-color);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.tr-ayah{padding:10px 12px;margin-bottom:8px;border:1px solid var(--border-light);border-radius:7px;background:var(--bg-card);cursor:pointer;transition:background .12s}
.tr-ayah:hover{background:var(--bg-alt)}
.tr-ayah-ref{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:4px}
.tr-ayah-ar{font-family:'Noto Naskh Arabic','Amiri',serif;font-size:18px;line-height:1.8;direction:rtl;text-align:right;color:var(--text);margin-bottom:4px}
.tr-ayah-tr{font-size:12px;color:var(--text-sec);line-height:1.5}

/* FOOTER */
.footer{padding:3px 12px;border-top:1px solid var(--border);background:var(--bg-alt);font-size:9px;color:var(--text-muted);display:flex;justify-content:space-between;flex-shrink:0}

/* RIGHT PANEL extras */
.rp-search{padding:4px 8px;border-bottom:1px solid var(--border)}
.rp-search input{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit;outline:none;color:var(--text);background:var(--bg-card)}
.rp-search input:focus{border-color:var(--accent)}

.t-sort{display:flex;flex-direction:column;gap:0;opacity:0;transition:opacity .12s;margin-left:auto;flex-shrink:0}
.t-item:hover .t-sort{opacity:1}
.t-item.checked .t-sort{opacity:.4}
.t-item.checked:hover .t-sort{opacity:1}
.sort-b{background:none;border:none;cursor:pointer;font-size:8px;color:var(--text-muted);padding:0 3px;line-height:1}
.sort-b:hover{color:var(--accent)}

.show-more-btn{padding:4px 14px;border:none;background:transparent;cursor:pointer;font-size:10px;color:var(--accent);font-family:inherit;font-weight:500;text-align:left;width:100%}
.show-more-btn:hover{background:rgba(128,128,128,.06)}

/* MOBILE */
@media(max-width:768px){
  :root{--sidebar-w:100%}
  .sidebar{position:absolute;top:0;height:100%;width:100%;z-index:10;transition:transform .25s}
  .sidebar{left:0;transform:translateX(0)}.sidebar.collapsed{transform:translateX(-100%);margin-left:0}
  .header{padding:7px 8px}.reading{padding:8px}
  .ab-entry-text.arabic-main{font-size:calc(19px*var(--rs-ar,1))}
  .col-col{min-width:200px}
  .layout-btn{display:none}
  .search-panel{width:100%!important;left:0!important;right:0!important;border-radius:0!important;max-height:80vh!important}
}

/* Touch devices have no hover — keep action controls always visible & bigger tap targets */
@media(hover:none){
  .tag-acts{opacity:1!important}
  .t-sort{opacity:1!important}
  .tag-ab{font-size:13px;padding:3px 6px}
  .sort-b{font-size:11px;padding:2px 5px}
}

/* Optional Arabic typefaces for the reading text (toggle in the toolbar) */
[data-arfont="kufi"] .arabic-main,
[data-arfont="kufi"] .ab-entry-text.rtl,
[data-arfont="kufi"] .col-ayah.rtl{font-family:'Reem Kufi','Noto Naskh Arabic','Amiri',serif}
/* Мусхаф Мадани — почерк Усмана Таха (KFGQPC Uthmanic Hafs) */
[data-arfont="hafs"] .arabic-main,
[data-arfont="hafs"] .ab-entry-text.rtl,
[data-arfont="hafs"] .col-ayah.rtl{font-family:'KFGQPC Uthmanic','Amiri Quran','Noto Naskh Arabic',serif;line-height:2.1}
/* Мусхафный насх (Amiri Quran) */
[data-arfont="amiri"] .arabic-main,
[data-arfont="amiri"] .ab-entry-text.rtl,
[data-arfont="amiri"] .col-ayah.rtl{font-family:'Amiri Quran','Noto Naskh Arabic',serif;line-height:2.1}
/* QPC v1 — постраничные глифы печатного мусхафа Мадани (per-page fonts, lazy) */
.qpc-line{direction:rtl;text-align:justify;text-align-last:center;line-height:calc(2.3*var(--lh-ar,1));font-size:calc(30px*var(--rs-ar,1));color:var(--text)}
.qpc-w{display:inline-block}
.qpc-w[data-loc]{cursor:pointer;border-radius:4px;transition:background .12s}
.qpc-w[data-loc]:hover{background:var(--accent-bg)}
.qpc-end{display:inline-block;margin:0 1px}
@media(max-width:768px){.qpc-line{font-size:calc(25px*var(--rs-ar,1))}}
/* Mushaf page mode */
.mushaf-shell{height:100%;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:18px 12px;background:var(--bg-alt)}
.mushaf-page{width:100%;max-width:680px;background:#fdfcf5;color:#1a1a1a;border:1px solid #e6e0c8;border-radius:6px;box-shadow:0 2px 14px rgba(0,0,0,.08);padding:26px calc(30px + var(--mar,0px))}
/* «На всю ширину экрана»: убираем рамку/поля страницы, чтобы строки получили
   максимальную ширину → fit-to-width делает глифы крупнее (без гор. прокрутки) */
body.mushaf-full .mushaf-shell{padding-left:0;padding-right:0}
body.mushaf-full .mushaf-page{max-width:none;border:none;border-radius:0;box-shadow:none;padding-left:5px;padding-right:5px}
.mushaf-page .m-line{direction:rtl;text-align:center;white-space:nowrap;font-size:calc(28px*var(--rs-ar,1));line-height:calc(2.35*var(--lh-ar,1))}
.mushaf-page .m-inner{display:inline-block;white-space:nowrap}
.mushaf-page .m-line .qpc-w{display:inline-block}
.m-empty{min-height:calc(28px*var(--rs-ar,1)*1.2)}
.m-surah-head{text-align:center;margin:10px 0;padding:6px 0;border-top:2px solid #c9a84c;border-bottom:2px solid #c9a84c}
.m-surah-name{font-family:'KFGQPC Uthmanic','Amiri Quran',serif;font-size:24px;color:#7a5c12;direction:rtl}
.m-basmala{text-align:center;direction:rtl;font-family:'KFGQPC Uthmanic','Amiri Quran',serif;font-size:24px;line-height:2;color:#1a1a1a;margin:4px 0}
.mushaf-nav{display:flex;align-items:center;justify-content:center;gap:14px;padding:14px;flex:none}
.m-pageno{font-size:12px;color:var(--text-sec)}
@media(max-width:768px){.mushaf-page{padding:18px 14px}.mushaf-page .m-line{font-size:calc(22px*var(--rs-ar,1))}.m-surah-name,.m-basmala{font-size:21px}}
/* Word-by-word layer: grid of words, each with its gloss underneath */
.wbw{flex:1;min-height:0;overflow-y:auto;width:100%;max-width:900px;margin:0 auto;padding:6px calc(12px + var(--mar,0px)) 60px}
.wbw-ayah{margin:6px 0 16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.wbw-head{display:flex;align-items:center;gap:8px;margin:6px 2px 10px}
.wbw-num{min-width:24px;height:24px;padding:0 7px;border-radius:12px;background:var(--accent);color:#fff;font-size:12px;font-weight:600;display:inline-flex;align-items:center;justify-content:center}
.wbw-grid{display:flex;flex-wrap:wrap;direction:rtl;gap:6px 4px}
.wbw-cell{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:5px 8px;border-radius:8px;border:1px solid transparent;transition:background .12s,border-color .12s}
.wbw-cell:hover{background:var(--bg-alt);border-color:var(--border)}
.wbw-cell:active{background:var(--accent);color:#fff}
.wbw-ar{font-size:calc(30px*var(--rs-ar,1));line-height:1.7;color:var(--text)}
.wbw-gl{direction:ltr;font-size:calc(11.5px*var(--rs-ru,1));color:var(--text-sec);max-width:130px;text-align:center;line-height:1.3}
.wbw-end{display:inline-flex;align-items:flex-start;font-size:calc(30px*var(--rs-ar,1));line-height:1.7;color:var(--accent);padding:5px 4px}
.wbw-attr{max-width:900px;margin:0 auto;padding:10px 6px 40px;font-size:11px;color:var(--text-muted);line-height:1.5}
.wbw-attr a{color:var(--text-sec)}
@media(max-width:768px){.wbw-ar,.wbw-end{font-size:calc(25px*var(--rs-ar,1))}}
/* Morphology card (built from the corpus by word address) */
.mcard-seg{display:flex;align-items:baseline;gap:8px;padding:6px 0;border-top:1px solid var(--border)}
.mcard-seg:first-child{border-top:none}
.mcard-ar{font-size:21px;direction:rtl;min-width:34px}
.mcard-info{flex:1;direction:ltr;text-align:left}
.mcard-pos{font-weight:600;font-size:12.5px}
.mcard-pos-ar{color:var(--text-muted);font-weight:400;font-size:13px;direction:rtl;margin-inline-start:6px;font-family:'Noto Naskh Arabic','Amiri',serif}
.mcard-gram{font-size:11.5px;color:var(--text-sec);margin-top:1px}
.mcard-lex{font-size:11.5px;color:var(--text-sec);margin-top:1px;direction:rtl;text-align:right}
.mcard-lex b{color:var(--text);font-weight:600}
.mcard-foot{margin-top:8px;padding-top:6px;border-top:1px solid var(--border);font-size:10px;color:var(--text-muted);line-height:1.4}
.mcard-foot a{color:var(--text-muted)}
/* ⚙ Вид settings popover */
.view-panel{position:fixed;top:46px;right:10px;z-index:60;width:284px;max-width:92vw;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.22);padding:6px 12px 12px;max-height:82vh;overflow:auto}
.vp-group{padding:8px 0;border-bottom:1px solid var(--border-light)}
.vp-group:last-of-type{border-bottom:none}
.vp-label{font-size:10px;font-weight:600;letter-spacing:.3px;color:var(--text-sec);text-transform:uppercase;margin-bottom:6px}
.vp-check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);padding:3px 0;cursor:pointer}
.vp-fonts{display:flex;flex-wrap:wrap;gap:5px}
.vp-font{font-family:inherit;font-size:12px;padding:5px 9px;border:1px solid var(--border);border-radius:14px;background:var(--bg);color:var(--text-sec);cursor:pointer}
.vp-font.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.vp-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--text);padding:4px 0}
.vp-step{display:flex;align-items:center;gap:8px}
.vp-step button{width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:15px;cursor:pointer;line-height:1}
.vp-step b{min-width:48px;text-align:center;font-size:12px;font-weight:600}
.vp-note{font-size:11px;color:var(--text-muted);line-height:1.4;padding:6px 0 2px}
.vp-reset{width:100%;margin-top:8px;padding:7px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text-sec);font-family:inherit;font-size:12px;cursor:pointer}
.vp-reset:hover{color:var(--text)}
.vp-close{width:100%;margin-top:6px;padding:8px;border:none;border-radius:7px;background:var(--accent);color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.np-sel,.np-num{width:100%;padding:7px 8px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);outline:none}
/* segmented mode switch (Аяты | Мусхаф) */
.seg{display:inline-flex;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.seg button{border:none;background:var(--bg);color:var(--text-sec);font-family:inherit;cursor:pointer;padding:6px 11px;font-size:12px}
.seg button.on{background:var(--accent);color:#fff}
.seg-sm button{padding:5px 9px;font-size:11px}
/* shared bottom prev/next navigation bar */
.bottom-nav{display:flex;align-items:center;gap:8px;padding:7px 10px;border-top:1px solid var(--border);background:var(--bg-card);flex-shrink:0}
.bn-arrow{background:var(--bg-alt);border:1px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;font-family:inherit;font-size:16px;line-height:1;color:var(--text);flex:none}
.bn-arrow:disabled{opacity:.35;cursor:default}
.bn-mid{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.bn-unit{flex:none;padding:6px 6px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit;font-size:12px;outline:none}
.bn-val{flex:1;min-width:0;padding:6px 6px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;outline:none}

/* SEARCH */
.search-panel{position:fixed;top:48px;left:50%;transform:translateX(-50%);width:600px;max-width:90vw;max-height:70vh;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.2);z-index:50;display:flex;flex-direction:column;overflow:hidden}
.search-panel.hidden{display:none}
.sp-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0}
.sp-input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;outline:none;color:var(--text);background:var(--bg)}
.sp-input:focus{border-color:var(--accent)}
.sp-close{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-muted);padding:4px}
.sp-opts{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;font-size:11px;color:var(--text-sec);flex-shrink:0;flex-wrap:wrap}
.sp-opt-label{display:flex;align-items:center;gap:3px;cursor:pointer}
.sp-opt-label input{margin:0}
.sp-results{flex:1;overflow-y:auto;padding:8px}
.sp-result{padding:10px 12px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .1s}
.sp-result:hover{background:var(--bg-alt)}
.sp-result:last-child{border-bottom:none}
.sp-ref{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:2px}
.sp-src{font-size:10px;color:var(--text-muted);margin-bottom:4px}
.sp-text{font-size:13px;line-height:1.6;color:var(--text-sec)}
.sp-text.rtl{direction:rtl;text-align:right;font-family:'Noto Naskh Arabic','Amiri',serif;font-size:15px}
.sp-hl{background:#FFE082;color:#333;border-radius:2px;padding:0 1px}
.sp-status{padding:12px;text-align:center;color:var(--text-muted);font-size:12px}
.sp-count{font-size:11px;color:var(--text-muted);padding:4px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
@media print{body{display:none!important}}
</style>

// Ayah IDs generated from surah.n — text comes from loaded JSON files
function getAyahIds(surahId){
  const su=SURAHS.find(s=>s.id===surahId);
  if(!su)return[];
  const arr=[];for(let i=1;i<=su.n;i++)arr.push(i);
  return arr;
}
// --- chunk readers (sync; the surah chunk must already be loaded via loadChunk) ---

// Arabic text for an ayah: dedicated _arabic, else any loaded Arabic tafsir
function getArabicFromCache(surahId,ayahId){
  const a=getChunk("_arabic",surahId);
  if(a&&a[String(ayahId)])return a[String(ayahId)];
  for(const t of CONFIG.tafsirs){
    if(t.lang==="ar"){const c=getChunk(t.id,surahId);if(c?.[String(ayahId)])return c[String(ayahId)];}
  }
  return "";
}

  for(const t of CONFIG.tafsirs){
    if(t.lang!=="ar"){const c=getChunk(t.id,surahId);if(c?.[String(ayahId)])return c[String(ayahId)];}
  }
  return "";
}

function touchChunk(key){
  const i=chunkLRU.indexOf(key);
  if(i>=0)chunkLRU.splice(i,1);
  chunkLRU.push(key);
  while(chunkLRU.length>MAX_CHUNKS){const old=chunkLRU.shift();delete chunkCache[old];}
}

// Lazily load ONE surah of one tafsir. Returns {ayah:text}. Cached + LRU-evicted.
async function loadChunk(id,surahId){
  const key=id+"|"+surahId;
  if(chunkCache[key]){touchChunk(key);return chunkCache[key];}
  let chunk=null;
  // 1. Offline preload (whole Quran in TL_DATA) -> slice the surah
  if(window.TL_DATA&&window.TL_DATA[id])chunk=window.TL_DATA[id][String(surahId)]||{};
  // 2. Per-surah chunk file (primary path)
  if(chunk===null){try{const r=await fetch(`${DATA_PATH}tafsirs/${id}/${surahId}.json`);if(r.ok)chunk=await r.json();}catch(e){}}
  // 3. Back-compat: monolithic file -> slice
  if(chunk===null){const whole=await loadWhole(id,true);if(whole)chunk=whole[String(surahId)]||{};}
  // 4. Placeholder for a real (not-yet-added) tafsir
  if(chunk===null){
    if(id==="_arabic"){chunk={};}
    else{
      const info=CONFIG.tafsirs.find(t=>t.id===id);const su=SURAHS.find(s=>s.id===surahId);chunk={};
      if(su)for(let i=1;i<=su.n;i++)chunk[i]=`[${info?.name||id}] Сура ${surahId}, аят ${i}\n\n※ Тафсир ещё не добавлен.`;
    }
  }
  chunkCache[key]=chunk;touchChunk(key);
  return chunk;
}

// Load the full tafsir (all surahs) — only used by search. Cached separately.
async function loadWhole(id,quiet){
  if(wholeCache[id])return wholeCache[id];
  if(window.TL_DATA&&window.TL_DATA[id]){wholeCache[id]=window.TL_DATA[id];return wholeCache[id];}
  const info=CONFIG.tafsirs.find(t=>t.id===id);
  const file=info?.file||`tafsirs/${id}.json`;
  try{const r=await fetch(DATA_PATH+file);if(r.ok){wholeCache[id]=await r.json();return wholeCache[id];}}catch(e){}
  return quiet?null:{};
}

function escAttr(s){return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// Lightweight Markdown for tafsir/translation segments: headings, bold/italic,
// `code`, > quote, -/1. lists, | tables |, --- rule. Plain text (with blank-line
// paragraphs / single-line breaks) renders unchanged. Always HTML-escaped first.
function mdInlineBasic(t){
  return t.replace(/\*\*([^*]+?)\*\*/g,"<strong>$1</strong>")
          .replace(/__([^_]+?)__/g,"<strong>$1</strong>")
          .replace(/(^|[^*])\*([^*\s][^*]*?)\*/g,"$1<em>$2</em>")
          .replace(/`([^`]+?)`/g,"<code>$1</code>");
}
function mdInline(t){
  // tap-to-open cards: [[видимое::текст карточки]] -> clickable word + grammar card.
  // Stash payloads behind sentinels (U+FFF9..B) so formatting/spaces never touch them.
  const cards=[];
  t=t.replace(/\[\[([^\]]+?)::([^\]]+?)\]\]/g,(m,lab,card)=>{
    cards.push(card);return "\uFFF9"+(cards.length-1)+"\uFFFA"+lab+"\uFFFB";
  });
  t=mdInlineBasic(t);
  return t.replace(/\uFFF9(\d+)\uFFFA([\s\S]*?)\uFFFB/g,(m,i,lab)=>
    `<button type="button" class="wcard" data-card="${cards[+i].replace(/"/g,"&quot;")}">${lab}</button>`);
}
// grammar/word card: render the payload (inline md, || = line break)
function renderCardText(raw){return mdInlineBasic(esc(String(raw||""))).replace(/\|\|/g,"<br>");}
// Show a popup card with arbitrary HTML, positioned next to an anchor element.
// (Positioning/dismiss mechanics are shared by the legacy [[::]] card and the
// corpus-driven morphology card — only the content source differs.)
function showWordCardEl(anchor,html){
  let el=document.getElementById("wordCard");
  if(!el){el=document.createElement("div");el.id="wordCard";el.className="word-card";document.body.appendChild(el);}
  el.innerHTML=html;
  el.style.display="block";
  const r=anchor.getBoundingClientRect(),cw=el.offsetWidth,ch=el.offsetHeight,W=window.innerWidth,H=window.innerHeight;
  let left=Math.max(8,Math.min(r.left+r.width/2-cw/2,W-cw-8));
  let top=r.bottom+6; if(top+ch>H-8)top=Math.max(8,r.top-ch-6);
  el.style.left=left+"px";el.style.top=top+"px";
}

function posLabel(pos){return POS_RU[pos]||pos;}
// Build the grammar card HTML from a word's segments. The header shows the
// VERBATIM English gloss (display-only, CC BY-NC-ND); the body is Russian
// grammar from the corpus. The data-quran "ru_ref" is never shown here.
function renderMorphCard(segs,gloss){
  if(!segs||!segs.length)return "";
  let h="";
  if(gloss&&(gloss.ru||gloss.en)){
    if(gloss.ru)h+=`<div style="font-size:14px;color:var(--text);font-weight:600;margin-bottom:2px">${esc(gloss.ru)}</div>`;
    if(gloss.en)h+=`<div style="font-size:11.5px;color:var(--text-muted);margin-bottom:6px">${esc(gloss.en)}</div>`;
  }
  for(const s of segs){
    const gram=[];
    if(s.aspect)gram.push(ASPECT_RU[s.aspect]||s.aspect);
    if(s.voice)gram.push(VOICE_RU[s.voice]||s.voice);
    if(s.form&&ROMAN[+s.form])gram.push("порода "+ROMAN[+s.form]);
    if(s.person)gram.push(PERSON_RU[s.person]||s.person);
    if(s.gender)gram.push(GENDER_RU[s.gender]||s.gender);
    if(s.number)gram.push(NUMBER_RU[s.number]||s.number);
    if(s.case)gram.push(CASE_RU[s.case]||s.case);
    if(s.indef)gram.push("неопредел.");
    let lex="";
    if(s.root||s.lemma){
      const parts=[];
      if(s.lemma)parts.push(`лемма <b>${esc(s.lemma)}</b>`);
      if(s.root)parts.push(`корень <b>${esc(s.root)}</b>`);
      lex=`<div class="mcard-lex">${parts.join(" · ")}</div>`;
    }
    h+=`<div class="mcard-seg">
      <span class="mcard-ar" style="color:${posColor(s.pos)}">${esc(s.ar)}</span>
      <span class="mcard-info">
        <span class="mcard-pos" style="color:${posColor(s.pos)}">${esc(posLabel(s.pos))}</span>${POS_AR[s.pos]?`<span class="mcard-pos-ar">${esc(POS_AR[s.pos])}</span>`:""}
        ${gram.length?`<div class="mcard-gram">${esc(gram.join(" · "))}</div>`:""}
        ${lex}
      </span></div>`;
  }
  h+=`<div class="mcard-foot">Разбор: <a href="http://corpus.quran.com" target="_blank" rel="noopener">Quranic Arabic Corpus</a></div>`;
  return h;
}
// Open the corpus card for a word element (data-loc="surah:ayah:word"); loads
// that surah's morph/words chunks lazily (cached after first use).
async function openMorphCard(el){
  const loc=el.dataset.loc;if(!loc)return;
  const[s,a,w]=loc.split(":");
  const[morph,words]=await Promise.all([loadWbwMorph(s),loadWbwWords(s)]);
  const segs=morph&&morph[a]&&morph[a][w];
  const gloss=words&&words[a]&&words[a][w];
  const html=renderMorphCard(segs,gloss);
  if(html)showWordCardEl(el,html);
}

function mdTableStart(L,i){return L[i].includes("|")&&i+1<L.length&&L[i+1].includes("|")&&/^[\s:|-]*-[\s:|-]*$/.test(L[i+1]);}
function mdBlockStart(L,i){const l=L[i];
  return /^\s*$/.test(l)||/^\s*---+\s*$/.test(l)||/^\s*#{1,4}\s/.test(l)||/^\s*&gt;\s?/.test(l)||/^\s*[-*]\s+/.test(l)||/^\s*\d+\.\s+/.test(l)||mdTableStart(L,i);}
function mdRender(src){
  if(src==null||src==="")return "";
  const L=esc(String(src)).split("\n"),out=[];let i=0;
  const row=r=>r.replace(/^\s*\|/,"").replace(/\|\s*$/,"").split("|").map(c=>c.trim());
  while(i<L.length){
    const ln=L[i];
    if(/^\s*$/.test(ln)){i++;continue;}
    if(/^\s*---+\s*$/.test(ln)){out.push("<hr>");i++;continue;}
    const h=ln.match(/^\s*(#{1,4})\s+(.*)$/);
    if(h){const n=h[1].length;out.push(`<div class="md-h md-h${n}">${mdInline(h[2])}</div>`);i++;continue;}
    if(mdTableStart(L,i)){
      const head=row(ln);i+=2;let body="";
      while(i<L.length&&!/^\s*$/.test(L[i])&&L[i].includes("|")){body+="<tr>"+row(L[i]).map(c=>`<td>${mdInline(c)}</td>`).join("")+"</tr>";i++;}
      out.push(`<table class="md-tbl"><thead><tr>${head.map(c=>`<th>${mdInline(c)}</th>`).join("")}</tr></thead><tbody>${body}</tbody></table>`);continue;
    }
    if(/^\s*&gt;\s?/.test(ln)){const q=[];while(i<L.length&&/^\s*&gt;\s?/.test(L[i])){q.push(L[i].replace(/^\s*&gt;\s?/,""));i++;}out.push(`<blockquote class="md-q">${mdInline(q.join("<br>"))}</blockquote>`);continue;}
    if(/^\s*[-*]\s+/.test(ln)){const it=[];while(i<L.length&&/^\s*[-*]\s+/.test(L[i])){it.push(L[i].replace(/^\s*[-*]\s+/,""));i++;}out.push("<ul class='md-ul'>"+it.map(x=>`<li>${mdInline(x)}</li>`).join("")+"</ul>");continue;}
    if(/^\s*\d+\.\s+/.test(ln)){const it=[];while(i<L.length&&/^\s*\d+\.\s+/.test(L[i])){it.push(L[i].replace(/^\s*\d+\.\s+/,""));i++;}out.push("<ol class='md-ol'>"+it.map(x=>`<li>${mdInline(x)}</li>`).join("")+"</ol>");continue;}
    const para=[];while(i<L.length&&!mdBlockStart(L,i)){para.push(L[i]);i++;}
    out.push(`<p class="md-p">${mdInline(para.join("<br>"))}</p>`);
  }
  return out.join("");
}
function toggleClamp(btn){const d=btn.previousElementSibling;const on=d.classList.toggle("clamped");btn.textContent=on?"Развернуть ▾":"Свернуть ▴";}

function renderTagPanel(el){
  const tree=getTagTree();
  function renderNode(node,anc){
    const path=tagPath(anc,node.name);
    const has=node.children?.length>0;
    const isOpen=!collapsedG["t_"+path];
    const cnt=countTag(path);
    const sel=ST.selectedTag===path;
    let h=`<div class="tag-node">
      <div class="tag-row ${sel?'selected':''}" onclick="selectTag('${escAttr(path)}')">
        <span class="tag-arrow" onclick="event.stopPropagation();collapsedG['t_${escAttr(path)}']=!collapsedG['t_${escAttr(path)}'];renderSB();">${has?(isOpen?'▼':'▶'):' '}</span>
        <span class="tag-name">${esc(node.name)}</span>
        ${cnt?`<span class="tag-cnt">${cnt}</span>`:''}
        <div class="tag-acts">
          <button class="tag-ab" onclick="event.stopPropagation();renameTag('${escAttr(path)}')" title="Переименовать">✏</button>
          <button class="tag-ab" onclick="event.stopPropagation();moveTag('${escAttr(path)}',-1)" title="Вверх">↑</button>
          <button class="tag-ab" onclick="event.stopPropagation();moveTag('${escAttr(path)}',1)" title="Вниз">↓</button>
          <button class="tag-ab" onclick="event.stopPropagation();deleteTag('${escAttr(path)}')" title="Удалить">×</button>
        </div>
      </div>`;
    if(has&&isOpen)h+=node.children.map(ch=>renderNode(ch,[...anc,node.name])).join("");
    return h+"</div>";
  }
  el.innerHTML=(tree.length?tree.map(n=>renderNode(n,[])).join(""):'<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:11px">Нет тегов</div>')

}

// Build the entries (Arabic + tafsirs + notes) for one ayah — used on demand by virtualization
function buildAyahBody(aid,enabled,loaded){
  let html="";
  // Arabic Quran-text variants (с огласовками / без огласовок / …) — each as its own line
  const qts=getEnabledQuranTexts();
  const multiQ=qts.length>1;
  const pack=activePack();const qpcData=loaded["__qpc"];
  for(const qt of qts){
    const lbl=multiQ?`<div class="ab-entry-label">${esc(qt.name)} <span class="lbl-ar">${qt.nameAr||''}</span></div>`:"";
    // Печатный мусхаф (QPC): главный огласованный текст рисуем глифами страницы
    if(pack&&qt.id==="_arabic"&&qpcData&&qpcData[String(aid)]){
      html+=`<div class="ab-entry">${lbl}${renderPackAyah(pack,qpcData[String(aid)],`${ST.surah}:${aid}`)}</div>`;
      continue;
    }
    const at=loaded[qt.id]?.[String(aid)];
    if(!at)continue;
    html+=`<div class="ab-entry">${lbl}<div class="ab-entry-text arabic-main selectable">${at}</div></div>`;
  }
  for(const t of enabled){
    if(t.id==="_notes"){
      const note=getNote(ST.surah,aid);
      html+=`<div class="ab-entry" style="background:var(--note-bg)">
        <div class="ab-entry-label" style="color:var(--note-color)">📝 Мои заметки</div>
        <textarea class="ab-note-area" placeholder="Ваши мысли..." oninput="saveNote(${ST.surah},${aid},this.value)">${esc(note)}</textarea>
      </div>`;
    } else {
      const text=loaded[t.id]?.[String(aid)]||null;
      const isAr=t.lang==="ar";
      const inner=text?mdRender(text):'<span style="color:var(--text-muted)">—</span>';
      const long=text&&text.length>600; // collapse very long tafsirs
      html+=`<div class="ab-entry">
        <div class="ab-entry-label">${esc(t.name)} <span class="lbl-ar">${t.nameAr||''}</span></div>
        <div class="ab-entry-text md selectable ${isAr?'rtl':''} ${long?'clamped':''}">${inner}</div>
        ${long?'<button class="more-btn" onclick="toggleClamp(this)">Развернуть ▾</button>':''}
      </div>`;
    }
  }
  return html;
}

// Virtualization: hydrate ayah bodies near the viewport, empty those far away (cap DOM size)
function setupHydration(area,enabled,loaded){
  if(hydrationObserver){hydrationObserver.disconnect();hydrationObserver=null;}
  const obs=new IntersectionObserver(entries=>{
    for(const e of entries){
      const el=e.target;
      if(e.isIntersecting){
        if(el.dataset.hyd!=="1"){el.innerHTML=buildAyahBody(+el.dataset.aid,enabled,loaded);el.dataset.hyd="1";el.style.minHeight="";}
      }else if(el.dataset.hyd==="1"){
        const h=el.offsetHeight;
        if(h)el.style.minHeight=h+"px"; // freeze height so scroll position is preserved
        el.innerHTML="";el.dataset.hyd="0";
      }
    }
  },{root:area,rootMargin:"1200px 0px"});
  area.querySelectorAll(".ab-body").forEach(b=>obs.observe(b));
  hydrationObserver=obs;
}

async function renderReading(el){
  const ayahIds=getAyahIds(ST.surah);
  const enabled=getEnabledList();
  const quranTexts=getEnabledQuranTexts();
  if(!enabled.length&&!quranTexts.length){
    el.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:13px;text-align:center;padding:40px">
      <div><div style="font-size:32px;margin-bottom:10px;opacity:.3">📚</div>Включите переводы или тафсиры<br>кнопкой 📚 справа вверху</div></div>`;
    return;
  }

  el.innerHTML=`<div class="reading" id="readingArea"><div style="text-align:center;color:var(--text-muted);padding:30px">Загрузка...</div></div>`;

  // Load only the current surah's chunk for each enabled tafsir + Arabic variant
  const loaded={};
  const toLoad=[...enabled.filter(t=>t.id!=="_notes"),...quranTexts];
  await Promise.all(toLoad.map(async t=>{loaded[t.id]=await loadChunk(t.id,ST.surah);}));
  // Mushaf pack glyphs (QPC v1 …) for the main Arabic line, if a pack font is active
  if(activePack())loaded["__qpc"]=await loadPackSurah(ST.arFont,ST.surah);

  const area=document.getElementById("readingArea");
  if(!area)return;

  // Columns layout is unusable on phones — always stack vertically there
  const layout=isM()?"h":ST.layout;
  if(layout==="h"){
    // Preserve the topmost visible ayah across a same-surah re-render (e.g. toggling a tafsir)
    let anchorAid=null;
    if(lastReadingSurah===ST.surah){
      const top=area.getBoundingClientRect().top;
      for(const b of area.querySelectorAll(".ayah-block")){
        if(b.getBoundingClientRect().bottom>top+4){anchorAid=b.dataset.aid;break;}
      }
    }
    // Lightweight skeleton: header + empty body per ayah; bodies hydrate on demand
    let html="";
    for(const aid of ayahIds){
      const hn=hasNote(ST.surah,aid);const ht=hasAT(ST.surah,aid);
      html+=`<div class="ayah-block" data-aid="${aid}"><div class="ab-head">
        <div style="display:flex;align-items:center;gap:8px"><span class="ab-num">${aid}</span>
          <button onclick="event.stopPropagation();openTagPopup(${aid},this)" style="background:${ht?'var(--tag-bg)':'var(--bg-card)'};border:1px solid ${ht?'var(--tag-color)':'var(--border)'};border-radius:4px;padding:1px 6px;cursor:pointer;font-size:11px;color:${ht?'var(--tag-color)':'var(--text-muted)'}" title="Теги">🏷${ht?' '+getATList(ST.surah,aid).length:''}</button>
        </div>
        <div class="ab-tag-dots">${hn?'<span class="ab-note-dot"></span>':''}</div>
      </div><div class="ab-body" data-aid="${aid}" style="min-height:48px"></div></div>`;
    }
    area.innerHTML=html;
    setupHydration(area,enabled,loaded);
    // a pending jump (📑 Переход) wins over scroll-anchor preservation
    if(ST.scrollToAyah!=null){
      const t=area.querySelector(`.ayah-block[data-aid="${ST.scrollToAyah}"]`);if(t)t.scrollIntoView({block:"start"});
      ST.scrollToAyah=null;
    }else if(anchorAid){const t=area.querySelector(`.ayah-block[data-aid="${anchorAid}"]`);if(t)t.scrollIntoView({block:"start"});}
  } else {
    if(hydrationObserver){hydrationObserver.disconnect();hydrationObserver=null;}
    // Vertical columns
    const cols=[];
    for(const qt of quranTexts)cols.push({id:qt.id,name:qt.nameAr||qt.name,isArabic:true,data:loaded[qt.id]});
    for(const t of enabled){
      if(t.id==="_notes")cols.push({id:"_notes",name:"📝 Заметки",isNote:true});
      else cols.push({id:t.id,name:t.name,nameAr:t.nameAr,lang:t.lang,data:loaded[t.id]});
    }
    if(!cols.length){area.innerHTML="";return;}

    let html=`<div class="col-layout" style="height:100%;overflow:auto">`;
    html+=`<div class="col-col" style="min-width:40px;max-width:50px;flex:none"><div class="col-head">#</div>`;
    for(const aid of ayahIds)html+=`<div class="col-ayah" style="text-align:center;font-weight:600;color:var(--accent);font-size:12px;display:flex;align-items:center;justify-content:center">${aid}</div>`;
    html+=`</div>`;

    for(const col of cols){
      html+=`<div class="col-col"><div class="col-head">${esc(col.name)}</div>`;
      for(const aid of ayahIds){
        if(col.isArabic){
          const pk=activePack();const qd=loaded["__qpc"];
          if(pk&&col.id==="_arabic"&&qd&&qd[String(aid)]){
            html+=`<div class="col-ayah">${renderPackAyah(pk,qd[String(aid)],`${ST.surah}:${aid}`)}</div>`;
          }else{
            const arText=col.data?.[String(aid)]||"";
            html+=`<div class="col-ayah arabic-main selectable">${arText||'—'}</div>`;
          }
        } else if(col.isNote){
          const note=getNote(ST.surah,aid);
          html+=`<div class="col-ayah" style="background:var(--note-bg);padding:4px 6px"><textarea class="ab-note-area" style="min-height:30px;font-size:11px" placeholder="..." oninput="saveNote(${ST.surah},${aid},this.value)">${esc(note)}</textarea></div>`;
        } else {
          const text=col.data?.[String(aid)]||"";
          const isAr=col.lang==="ar";
          html+=`<div class="col-ayah md selectable ${isAr?'rtl':''}">${text?mdRender(text):'—'}</div>`;
        }
      }
      html+=`</div>`;
    }
    html+=`</div>`;
    area.innerHTML=html;
  }
  lastReadingSurah=ST.surah;
}

async function renderTagResults(el){
  const ayahKeys=ayahsForTag(ST.selectedTag);
  if(!ayahKeys.length){
    el.innerHTML=`<div class="tag-results"><div class="tr-header">🏷 ${esc(ST.selectedTag)}</div><div style="color:var(--text-muted);padding:20px;text-align:center">Нет аятов с этим тегом</div></div>`;
    return;
  }
  // Preload chunks for the surahs referenced by the tagged ayahs (Arabic + one translation)
  const surahs=[...new Set(ayahKeys.map(k=>+k.split(":")[0]))];
  const firstTrans=CONFIG.tafsirs.find(t=>t.lang!=="ar"&&ST.enabled[t.id])||CONFIG.tafsirs.find(t=>t.lang!=="ar");
  await Promise.all(surahs.flatMap(s=>{
    const ps=[loadChunk("_arabic",s).catch(()=>{})];
    if(firstTrans)ps.push(loadChunk(firstTrans.id,s).catch(()=>{}));
    return ps;
  }));
  let html=`<div class="tag-results"><div class="tr-header">🏷 ${esc(ST.selectedTag)} — ${ayahKeys.length} аятов</div>`;
  for(const k of ayahKeys){
    const[s,a]=k.split(":");
    const su=SURAHS.find(x=>x.id==+s);
    const arText=getArabicFromCache(+s,+a);
    const trText=getAnyTranslation(+s,+a);
    html+=`<div class="tr-ayah" onclick="ST.selectedTag=null;goSurah(${s})">
      <div class="tr-ayah-ref">${su?su.ru:s} : ${a}</div>
      ${arText?`<div class="tr-ayah-ar">${arText}</div>`:''}
      ${trText?`<div class="tr-ayah-tr">${trText}</div>`:''}
    </div>`;
  }
  el.innerHTML=html+`</div>`;
}

const FACET_LABELS={
  lang:{label:"Язык",vals:[["ar","Арабский"],["ru","Русский"]]},
  kind:{label:"Тип",vals:[["quran","Коран"],["translation","Перевод"],["tafsir","Тафсир"]]},
  era:{label:"Эпоха",vals:[["classical","Классич."],["modern","Современ."]]},
};
function tagLabel(id){const f=(CONFIG.facetTags||[]).find(x=>x.id===id);return f?f.name:id;}
function configHasFacet(key,v){return CONFIG.tafsirs.some(t=>key==="tags"?(t.tags||[]).includes(v):(t[key]||"")===v);}
function passFacets(t){
  for(const key of ["lang","kind","era"]){
    const act=ST.facets[key];
    if(act&&act.length&&!act.includes(t[key]||""))return false;
  }
  const tagAct=ST.facets.tags;
  if(tagAct&&tagAct.length){const tt=t.tags||[];if(!tagAct.some(x=>tt.includes(x)))return false;}
  return true;
}
function toggleFacet(key,v){
  const a=ST.facets[key]||(ST.facets[key]=[]);
  const i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);
  renderRP();
}

// Arabic text normalization for search
const AR_DIACRITICS=/[ؐ-ًؚ-ٰٟۖ-ۜ۟-۪ۨ-ۭ࣓-ࣿ]/g;
const AR_TATWEEL=/\u0640/g; // Kashida/Tatweel

function normalizeArabic(s){
  return s
    .replace(AR_DIACRITICS,"")   // remove tashkeel
    .replace(AR_TATWEEL,"")      // remove tatweel/kashida
    .replace(/[أإآٱ]/g,"ا")  // alif forms -> alif
    .replace(/ة/g,"ه")                      // ta marbuta -> ha
    .replace(/ى/g,"ي");                     // alif maqsura -> ya
}

function normalizeSearch(s){return normalizeArabic(s).toLowerCase().trim();}

// Arabic Quran-text variants (kind:quran) — rendered as the main Arabic column(s), in config order
function getEnabledQuranTexts(){return CONFIG.tafsirs.filter(t=>t.kind==="quran"&&ST.enabled[t.id]);}
function isQuranText(id){const t=CONFIG.tafsirs.find(x=>x.id===id);return t&&t.kind==="quran";}

function getEnabledList(){
  let uo=getUserOrder();
  const allTafsirs=[];
  const allIds=new Set();

  // Collect enabled tafsirs/translations (Quran-text variants are handled separately)
  CONFIG.groups.forEach(g=>{
    CONFIG.tafsirs.filter(t=>t.group===g.id&&t.kind!=="quran").forEach(t=>{
      if(ST.enabled[t.id]){allTafsirs.push(t);allIds.add(t.id);}
    });
  });
  if(ST.enabled._notes){allTafsirs.push({id:"_notes",name:"Мои заметки"});allIds.add("_notes");}

  if(uo.length){
    // Clean stale IDs (removed from config or disabled)
    uo=uo.filter(id=>allIds.has(id));
    // Find new IDs not in userOrder — append at end
    const newIds=[];
    allTafsirs.forEach(t=>{if(!uo.includes(t.id))newIds.push(t.id);});
    if(newIds.length){uo=uo.concat(newIds);setUserOrder(uo);}

    // Build ordered list
    const ordered=[];
    uo.forEach(id=>{const t=allTafsirs.find(x=>x.id===id);if(t)ordered.push(t);});
    return ordered;
  }
  return allTafsirs;
}

function moveEnabled(id,dir){
  const list=getEnabledList().map(t=>t.id);
  const idx=list.indexOf(id);
  if(idx<0)return;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=list.length)return;
  [list[idx],list[newIdx]]=[list[newIdx],list[idx]];
  setUserOrder(list);
  renderRP();
  renderCenter();
}

let searchTimer=null;
let searchOpen=false;

function toggleSearch(){
  searchOpen=!searchOpen;
  const panel=document.getElementById("searchPanel");
  panel.classList.toggle("hidden",!searchOpen);
  if(searchOpen){
    document.getElementById("spInput").value="";

    document.getElementById("spResults").innerHTML=`<div class="sp-status">Введите запрос (минимум 2 символа)</div>`;
    document.getElementById("spCount").classList.add("hidden");
    pushOverlay();
  }else consumeOverlay();
  updateBackdrop();

function onSearchInput(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(doSearch,400);
}

async function doSearch(){
  const raw=document.getElementById("spInput").value;
  const query=normalizeSearch(raw);
  const resultsEl=document.getElementById("spResults");
  const countEl=document.getElementById("spCount");

  if(query.length<2){
    resultsEl.innerHTML=`<div class="sp-status">Введите минимум 2 символа</div>`;
    countEl.classList.add("hidden");
    return;
  }

  resultsEl.innerHTML=`<div class="sp-status">Поиск...</div>`;

  const searchAll=document.getElementById("spAllTafsirs")?.checked;

  // Determine which tafsirs to search
  let toSearch=[];
  if(searchAll){
    toSearch=CONFIG.tafsirs.slice();
  } else {
    CONFIG.groups.forEach(g=>{
      CONFIG.tafsirs.filter(t=>t.group===g.id).forEach(t=>{
        if(ST.enabled[t.id])toSearch.push(t);
      });
    });
  }

  // Also search in built-in ayah translations
  const results=[];
  const MAX=100;

  // Query words (>=2 chars) for the inverted index (AND across tokens, substring on words)
  const tokens=(query.match(/[\p{L}\p{N}_]+/gu)||[]).filter(w=>w.length>=2);

  for(const t of toSearch){
    if(results.length>=MAX)break;
    const idx=tokens.length?await loadIndex(t.id):null;
    let refs=null; // Set of "s:a" satisfying ALL tokens — null means "no index, fall back"
    if(idx){
      for(const tok of tokens){
        const set=new Set();
        for(const w in idx){if(w.includes(tok))for(const ref of idx[w].split(" "))set.add(ref);}
        if(refs===null)refs=set; else for(const r of [...refs])if(!set.has(r))refs.delete(r);
        if(refs.size===0)break;
      }
    }
    if(refs!==null){
      // Index hit: pull display text only for matched ayahs, grouped by surah (chunked)
      const bySurah={};
      for(const ref of refs){const c=ref.indexOf(":");(bySurah[ref.slice(0,c)]=bySurah[ref.slice(0,c)]||[]).push(ref.slice(c+1));}
      for(const sid of Object.keys(bySurah).sort((a,b)=>+a-+b)){
        if(results.length>=MAX)break;
        const chunk=await loadChunk(t.id,+sid);
        for(const aid of bySurah[sid].sort((a,b)=>+a-+b)){
          if(results.length>=MAX)break;
          const text=chunk[aid];if(!text)continue;
          results.push({surah:+sid,ayah:+aid,text,source:t.name,sourceAr:t.nameAr,lang:t.lang,tafsirId:t.id});
        }
      }
    }else{
      // No index — fall back to full-text scan
      const data=await loadWhole(t.id);
      if(!data)continue;
      for(const sid in data){
        if(results.length>=MAX)break;
        const surahData=data[sid];
        for(const aid in surahData){
          if(results.length>=MAX)break;
          if(normalizeSearch(surahData[aid]).includes(query)){
            results.push({surah:+sid,ayah:+aid,text:surahData[aid],source:t.name,sourceAr:t.nameAr,lang:t.lang,tafsirId:t.id});
          }
        }
      }
    }
  }

  // Also search user notes
  const notes=getNotes();
  for(const k in notes){
    if(results.length>=MAX)break;
    const normalized=normalizeSearch(notes[k]);
    if(normalized.includes(query)){
      const[s,a]=k.split(":");
      results.push({surah:+s,ayah:+a,text:notes[k],source:"📝 Мои заметки",lang:"ru"});
    }
  }

  countEl.textContent=`Найдено: ${results.length}${results.length>=MAX?' (показаны первые '+MAX+')':''}`;
  countEl.classList.remove("hidden");

  if(!results.length){
    resultsEl.innerHTML=`<div class="sp-status">Ничего не найдено</div>`;
    return;
  }

  // Render results with highlighting
  resultsEl.innerHTML=results.map(r=>{
    const su=SURAHS.find(s=>s.id===r.surah);
    const suName=su?su.ru:`Сура ${r.surah}`;
    const isAr=r.lang==="ar";

    // Get a snippet around the match
    let snippet=r.text;
    const nText=normalizeSearch(snippet);
    const matchPos=nText.indexOf(query);
    if(snippet.length>300&&matchPos>=0){
      const start=Math.max(0,matchPos-80);
      const end=Math.min(snippet.length,matchPos+query.length+120);
      snippet=(start>0?'...':'')+snippet.substring(start,end)+(end<snippet.length?'...':'');
    }

    // Highlight matches (approximate — highlight in original based on normalized position)
    const highlightedSnippet=highlightMatch(snippet,query);

    return `<div class="sp-result" onclick="goSearchResult(${r.surah},${r.ayah})">
      <div class="sp-ref">${suName} : ${r.ayah}</div>
      <div class="sp-src">${esc(r.source)} ${r.sourceAr?'<span style="font-family:Amiri;direction:rtl">'+r.sourceAr+'</span>':''}</div>
      <div class="sp-text ${isAr?'rtl':''}">${highlightedSnippet}</div>
    </div>`;
  }).join("");
}

function highlightMatch(text,query){
  const orig=text;
  const norm=normalizeArabic(orig).toLowerCase();

  // Build map: normalized index → original index
  const map=[];
  for(let oi=0;oi<orig.length;oi++){
    const normalized=normalizeArabic(orig[oi]).toLowerCase();
    for(let k=0;k<normalized.length;k++) map.push(oi);
  }
  map.push(orig.length); // sentinel

  // Find all matches in normalized text
  const matches=[];
  let pos=norm.indexOf(query);
  while(pos>=0){
    const origStart=map[pos]!==undefined?map[pos]:0;
    const normEnd=pos+query.length;
    const origEnd=normEnd<map.length?map[normEnd]:orig.length;
    matches.push([origStart,origEnd]);
    pos=norm.indexOf(query,normEnd);
  }

  if(!matches.length)return esc(orig);

  const parts=[];
  let last=0;
  for(const[s,e]of matches){
    if(s>last)parts.push(esc(orig.substring(last,s)));
    parts.push('<span class="sp-hl">'+esc(orig.substring(s,e))+'</span>');
    last=e;
  }
  if(last<orig.length)parts.push(esc(orig.substring(last)));
  return parts.join("");
}

function pushSurahHash(id){const h="#"+id;if(location.hash!==h)history.pushState({surah:id},"",h);}
function applyHash(initial){
  const raw=decodeURIComponent((location.hash||"").replace(/^#/,"")).trim();
  const m=raw.match(/^(\d+)(?::(\d+))?$/);
  if(!m)return false;
  const sid=+m[1];
  if(!SURAHS.find(s=>s.id===sid))return false;
  pendingAyah=m[2]?+m[2]:null;
  if(ST.surah!==sid||ST.selectedTag){ST.surah=sid;ST.selectedTag=null;if(!initial)render();}
  if(pendingAyah)scrollToAyah(pendingAyah);
  return true;
}
function scrollToAyah(ayah){
  let tries=0;
  (function tryScroll(){
    const area=document.getElementById("readingArea");
    const blk=area&&area.querySelector(`.ayah-block[data-aid="${ayah}"]`);
    if(blk){
      blk.scrollIntoView({behavior:"smooth",block:"center"});
      blk.style.boxShadow="0 0 0 2px var(--accent)";
      setTimeout(()=>{blk.style.boxShadow="";},2000);
      pendingAyah=null;
    }else if(tries++<25){setTimeout(tryScroll,150);}
  })();
}

const VIEW_LIMITS={fsAr:[0.7,2.4,0.1],fsRu:[0.7,2.2,0.1],lhAr:[0.7,2.0,0.1],lhRu:[0.7,2.0,0.1],mar:[0,160,16],sbScale:[0.8,1.8,0.1]};

function applyMushafFull(){document.body.classList.toggle("mushaf-full",!!ST.mushafFull);}
function setMushafFull(){ST.mushafFull=!ST.mushafFull;ss("mushafFull",ST.mushafFull);applyMushafFull();refitIfPage();renderViewPanel();}
function bumpView(key,dir){
  const[lo,hi,step]=VIEW_LIMITS[key];
  ST[key]=Math.min(hi,Math.max(lo,Math.round((ST[key]+dir*step)*100)/100));
  ss(key,ST[key]);applyView();refitIfPage();renderViewPanel();
}
function resetView(){
  for(const k in VIEW_DEFAULTS){ST[k]=VIEW_DEFAULTS[k];ss(k,ST[k]);}
  applyView();
  // "исходные = печатный": also reset the typeface to the printed mushaf
  if(ST.arFont!=="qpc1"){ST.arFont="qpc1";ss("arFont","qpc1");applyArFont();renderCenter();}
  refitIfPage();renderViewPanel();
}

function renderViewPanel(){
  let el=document.getElementById("viewPanel");
  if(!el){el=document.createElement("div");el.id="viewPanel";el.className="view-panel";document.body.appendChild(el);}
  if(!ST.viewOpen){el.style.display="none";return;}
  el.style.display="block";
  const pct=k=>Math.round(ST[k]*100)+"%";
  const step=(label,key,val)=>`<div class="vp-row"><span>${label}</span><span class="vp-step"><button onclick="bumpView('${key}',-1)">−</button><b>${val}</b><button onclick="bumpView('${key}',1)">+</button></span></div>`;
  const resetBtn=`<button class="vp-reset" onclick="resetView()">↺ По умолчанию</button>`;
  if(ST.pageMode){
    // page mode = printed vowelled glyphs at a fixed column fit: only line spacing
    // is meaningful (size/margins are absorbed by the fit; font is fixed)
    el.innerHTML=`<div class="vp-group"><div class="vp-label">Страница</div>`+

// --- 📑 Переход: jump by surah / juz / rub al-hizb / page (both modes) -------
function juzForPage(pg){
  const js=qpcMeta&&qpcMeta.juzStart;if(!js)return null;
  let cur=1;for(let j=1;j<=30;j++){if(js[j]&&js[j].page<=pg)cur=j;else break;}return cur;
}
// Hizb (60) derives from the rub al-hizb index (4 rubs per hizb): hizb h → rub (h-1)*4+1
function hizbStart(h){const r=qpcMeta&&qpcMeta.rubStart;return r?r[(h-1)*4+1]||null:null;}
function hizbForPage(pg){let cur=1;for(let h=1;h<=60;h++){const s=hizbStart(h);if(s&&s.page<=pg)cur=h;else break;}return cur;}
function pageLocation(pg){
  const total=qpcMeta&&qpcMeta.pages||604;
  const pf=qpcMeta&&qpcMeta.pageStart&&qpcMeta.pageStart[pg];
  const su=pf?SURAHS.find(s=>s.id===pf.surah):null;
  const juz=juzForPage(pg);
  return `${su?esc(su.ru):"Мусхаф"}${juz?` · Джуз ${juz}`:""} · стр. ${pg}/${total}`;
}
function goAyah(surah,ayah){
  ST.surah=surah;ST.selectedTag=null;ST.scrollToAyah=ayah||1;
  if(isM()){ST.sidebarOpen=false;document.getElementById("sidebar").classList.add("collapsed");}
  pushSurahHash(surah);render();
}
function jumpTo(t){ // {page?, surah?, ayah?}
  // resolve a page for EVERY jump and keep ST.mushafPage as the position of
  // record in both modes — otherwise prev/next loses where we are within a
  // surah and juz/hizb/page stepping gets stuck
  let pg=t.page;
  if(pg==null&&t.surah){const st=qpcMeta&&qpcMeta.surahStart&&qpcMeta.surahStart[t.surah];pg=st?st.page:1;}
  if(pg!=null)ST.mushafPage=pg;
  if(ST.pageMode){
    gotoPage(pg||1);
  }else{
    if(t.surah)goAyah(t.surah,t.ayah||1);
    else if(t.page){const pf=qpcMeta&&qpcMeta.pageStart&&qpcMeta.pageStart[t.page];if(pf)goAyah(pf.surah,pf.ayah);}
  }
}
function navJumpSurah(v){jumpTo({surah:+v});}
function navJumpJuz(v){const j=qpcMeta&&qpcMeta.juzStart&&qpcMeta.juzStart[+v];if(j)jumpTo(j);}
function navJumpHizb(v){const s=hizbStart(Math.max(1,Math.min(60,+v||1)));if(s)jumpTo(s);}
function navJumpPage(v){const total=qpcMeta&&qpcMeta.pages||604;v=Math.max(1,Math.min(total,+v||1));jumpTo({page:v});}
// Switch reading mode (Аяты ↔ Мусхаф); keeps your place via togglePageMode.
function setReadMode(toPage){if(!!ST.pageMode!==!!toPage)togglePageMode();}
// Three-way reading mode: 'ayat' | 'words' (пословный) | 'page' (мусхаф).
function setMode(mode){
  if(mode==="page"){ if(!ST.pageMode){ST.wbwMode=false;ss("wbwMode",false);togglePageMode();} return; }
  // 'ayat' or 'words': both live outside page mode
  ST.wbwMode=(mode==="words");ss("wbwMode",ST.wbwMode);
  if(ST.pageMode){togglePageMode();return;} // leaving page mode re-renders for us
  renderCB();renderBottomNav();renderCenter();
}

// --- bottom prev/next navigation by a chosen unit (+ swipe) ------------------
function curPos(){
  const page=ST.mushafPage||1; // tracked on every jump (both modes)
  const surah=ST.pageMode?((qpcMeta&&qpcMeta.pageStart&&qpcMeta.pageStart[page]||{}).surah||1):ST.surah;
  return {page,surah,juz:juzForPage(page)||1,hizb:hizbForPage(page)||1};
}
function setNavUnit(u){ST.navUnit=u;ss("navUnit",u);renderBottomNav();}
function navJumpValue(v){const u=ST.navUnit;
  if(u==="surah")navJumpSurah(v);else if(u==="page")navJumpPage(v);
  else if(u==="juz")navJumpJuz(v);else navJumpHizb(v);}
// In mushaf mode only one page is shown, so the arrows always flip PAGES
// regardless of the picker unit; the picker is for jumping to a surah/juz/etc.
function stepUnit(){return ST.pageMode?"page":ST.navUnit;}
function stepSection(dir){
  const p=curPos(),u=stepUnit();
  if(u==="surah")jumpTo({surah:Math.max(1,Math.min(114,p.surah+dir))});
  else if(u==="page")navJumpPage(p.page+dir);
  else if(u==="juz")navJumpJuz(Math.max(1,Math.min(30,p.juz+dir)));
  else navJumpHizb(Math.max(1,Math.min(60,p.hizb+dir)));
}
// One unified navigation bar (both modes): step unit + a full picker list of
// that unit + prev/next arrows. All four units always available.
function renderBottomNav(){
  const el=document.getElementById("bottomNav");if(!el)return;
  if(ST.selectedTag){el.style.display="none";return;}
  el.style.display="flex";
  const p=curPos(),u=ST.navUnit,total=qpcMeta&&qpcMeta.pages||604;
  const units=[["surah","Сура"],["page","Страница"],["juz","Джуз"],["hizb","Хизб"]];
  const unitSel=`<select class="bn-unit" onchange="setNavUnit(this.value)" title="Что листать">`+
    units.map(([v,n])=>`<option value="${v}" ${v===u?"selected":""}>${n}</option>`).join("")+`</select>`;
  let opts,idx,max;
  if(u==="surah"){opts=SURAHS.map(s=>`<option value="${s.id}" ${s.id===p.surah?"selected":""}>${s.id}. ${esc(s.ru)}</option>`).join("");idx=p.surah;max=114;}
  else if(u==="page"){opts=Array.from({length:total},(_,i)=>`<option value="${i+1}" ${i+1===p.page?"selected":""}>Страница ${i+1}</option>`).join("");idx=p.page;max=total;}
  else if(u==="juz"){opts=Array.from({length:30},(_,i)=>`<option value="${i+1}" ${i+1===p.juz?"selected":""}>Джуз ${i+1}</option>`).join("");idx=p.juz;max=30;}
  else{opts=Array.from({length:60},(_,i)=>`<option value="${i+1}" ${i+1===p.hizb?"selected":""}>Хизб ${i+1}</option>`).join("");idx=p.hizb;max=60;}
  const valSel=`<select class="bn-val" onchange="navJumpValue(this.value)">${opts}</select>`;
  // arrow bounds follow the STEP unit (page in mushaf mode), not the picker
  const su=stepUnit();
  const aidx=su==="surah"?p.surah:su==="page"?p.page:su==="juz"?p.juz:p.hizb;
  const amax=su==="surah"?114:su==="page"?total:su==="juz"?30:60;
  const tip=su==="page"?"страница":su==="surah"?"сура":su==="juz"?"джуз":"хизб";
  el.innerHTML=`<button class="bn-arrow" onclick="stepSection(-1)" ${aidx<=1?"disabled":""} title="Предыдущая ${tip}">‹</button>`+
    `<span class="bn-mid">${unitSel}${valSel}</span>`+
    `<button class="bn-arrow" onclick="stepSection(1)" ${aidx>=amax?"disabled":""} title="Следующая ${tip}">›</button>`;
}
// horizontal swipe on the reading area → prev/next section (skip column layout's
// own horizontal scrolling)
let _swipeX=0,_swipeY=0,_swipeOk=false;
function setupSwipe(){
  const c=document.getElementById("centerBody");if(!c)return;
  c.addEventListener("touchstart",e=>{const t=e.changedTouches[0];_swipeX=t.clientX;_swipeY=t.clientY;
    _swipeOk=!(!ST.pageMode&&ST.layout==="v"&&!isM());},{passive:true});
  c.addEventListener("touchend",e=>{
    if(!_swipeOk)return;const t=e.changedTouches[0];const dx=t.clientX-_swipeX,dy=t.clientY-_swipeY;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5)stepSection(dx<0?1:-1); // swipe left → next
  },{passive:true});
}

// --- Mushaf packs: page-based glyph fonts (e.g. QPC v1) ---------------------
// A "pack" renders each word as a Private Use Area glyph that only displays with
// that page's own font. Registry is extensible: add Indopak / Warsh / v2 here.
const PACKS={
  qpc1:{id:"qpc1",type:"page-font",dataDir:"qpc/v1/surah",pageDir:"qpc/v1/page",meta:"qpc/v1/meta.json",
    fontFamily:p=>`qpc1-p${p}`,fontUrl:p=>`fonts/qpc-v1/p${p}.woff2`}
};
function activePack(){return PACKS[ST.arFont]||null;}
// Lazily inject one @font-face per page the first time that page is shown.
const _packFontsLoaded=new Set();
function ensurePageFont(pack,page){
  const key=pack.id+":"+page;
  if(_packFontsLoaded.has(key))return;
  _packFontsLoaded.add(key);
  const st=document.createElement("style");
  st.textContent=`@font-face{font-family:'${pack.fontFamily(page)}';src:url('${pack.fontUrl(page)}') format('woff2');font-display:swap}`;
  document.head.appendChild(st);
}
// Per-surah glyph data: {ayah:{"w":[[glyph,page],...],"e":[glyph,page]|null}}
const qpcCache={};
async function loadPackSurah(packId,surah){
  const k=packId+"|"+surah;
  if(qpcCache[k]!==undefined)return qpcCache[k];
  const pack=PACKS[packId];
  try{const r=await fetch(`${DATA_PATH}${pack.dataDir}/${surah}.json`);qpcCache[k]=r.ok?await r.json():null;}
  catch(e){qpcCache[k]=null;}
  return qpcCache[k];
}
// Build the glyph HTML for one ayah; words stay individually selectable.
// When loc ("surah:ayah") is given, each word carries data-loc="surah:ayah:pos"
// so tapping it opens the corpus grammar card (positions are aligned 1:1).
function renderPackAyah(pack,entry,loc){
  if(!entry)return "";
  let html="";
  entry.w.forEach((wp,i)=>{const g=wp[0],p=wp[1];ensurePageFont(pack,p);
    const dl=loc?` data-loc="${loc}:${i+1}"`:"";
    html+=`<span class="qpc-w"${dl} style="font-family:'${pack.fontFamily(p)}'">${g}</span> `;});
  if(entry.e){const g=entry.e[0],p=entry.e[1];ensurePageFont(pack,p);html+=`<span class="qpc-end" style="font-family:'${pack.fontFamily(p)}'">${g}</span>`;}
  return `<div class="qpc-line selectable">${html}</div>`;
}

// --- Mushaf page mode: faithful page-by-page layout (QPC v1) ----------------
let qpcMeta=null;
let mushafResizeObs=null; // re-fits line scaling when the column width changes
async function loadQpcMeta(){
  if(qpcMeta)return qpcMeta;
  try{const r=await fetch(`${DATA_PATH}qpc/v1/meta.json`);qpcMeta=r.ok?await r.json():null;}catch(e){qpcMeta=null;}
  return qpcMeta;
}
const qpcPageCache={};
async function loadQpcPage(p){
  if(qpcPageCache[p]!==undefined)return qpcPageCache[p];
  try{const r=await fetch(`${DATA_PATH}qpc/v1/page/${p}.json`);qpcPageCache[p]=r.ok?await r.json():null;}catch(e){qpcPageCache[p]=null;}
  return qpcPageCache[p];
}
async function togglePageMode(){
  const meta=await loadQpcMeta();
  ST.pageMode=!ST.pageMode;
  if(ST.pageMode){ // entering: open the page that holds the current surah
    const st=meta&&meta.surahStart&&meta.surahStart[ST.surah];if(st)ST.mushafPage=st.page;
  }else{ // leaving: continue from the surah/ayah shown on the current page
    const pf=meta&&meta.pageStart&&meta.pageStart[ST.mushafPage];if(pf){ST.surah=pf.surah;ST.scrollToAyah=pf.ayah;}
  }
  renderCB();renderBottomNav();await renderCenter();
}
async function gotoPage(p){
  const meta=await loadQpcMeta();const total=meta?.pages||604;
  ST.mushafPage=Math.max(1,Math.min(total,p));
  renderCB();renderBottomNav(); // refresh title + bottom bar
  await renderMushafPage(document.getElementById("centerBody"));
}
// One physical mushaf line of glyphs. The glyphs carry no kashida, so a line at
// a single size only fills ~80-95% of the column; instead of stretching the
// SPACES (which makes "rivers"), fitMushafLines() scales each line's font-size up
// to fill the column — words stay dense, spaces normal. Surah-end / framed lines
// are centered and left unscaled.
function mushafGlyphLine(pack,words,centered){
  let h="";for(const wp of words){const g=wp[0],p=wp[1];ensurePageFont(pack,p);h+=`<span class="qpc-w" style="font-family:'${pack.fontFamily(p)}'">${g}</span> `;}
  return `<div class="m-line${centered?' m-line-c':''} selectable"><span class="m-inner">${h}</span></div>`;
}
// Uniform page fit: every line on a page is scaled by the SAME factor, so all
// glyphs are one size (no per-line "ballooning"). The factor is chosen so the
// widest line exactly fills the column; shorter lines stay narrower and are
// centered. Shrink (narrow screens) is uncapped; growth is capped so a page of
// short lines doesn't balloon. Recomputed from the live column width on resize.
const MUSHAF_MAX_FIT=1.5;
const MUSHAF_FIT_SAFE=0.99; // keep final width strictly inside the column
function fitMushafLines(host){
  const lines=host.querySelectorAll(".m-line:not(.m-empty)");
  // reset to the CSS base size first, so we measure true natural widths under
  // the CURRENT column width — never a previously-scaled value
  for(const ln of lines)ln.style.fontSize="";
  void host.offsetWidth; // force one reflow before measuring
  // the widest (tightest) line dictates the single page-wide scale
  let minRatio=Infinity;
  for(const ln of lines){
    const inner=ln.querySelector(".m-inner");if(!inner)continue;
    const colW=ln.clientWidth, natW=inner.scrollWidth;
    if(!colW||!natW)continue;
    minRatio=Math.min(minRatio,colW/natW);
  }
  if(!isFinite(minRatio))return;
  const scale=Math.min(minRatio,MUSHAF_MAX_FIT)*MUSHAF_FIT_SAFE;
  for(const ln of lines){
    const base=parseFloat(getComputedStyle(ln).fontSize);
    ln.style.fontSize=(base*scale)+"px"; // same kegl for every line on the page
  }
}
async function renderMushafPage(el){
  const pack=PACKS.qpc1;
  const meta=await loadQpcMeta();const total=meta?.pages||604;
  let pg=Math.max(1,Math.min(total,ST.mushafPage||1));ST.mushafPage=pg;
  el.innerHTML=`<div class="mushaf-shell"><div id="mushafPage" class="mushaf-page"><div style="text-align:center;color:var(--text-muted);padding:40px">Загрузка страницы ${pg}…</div></div></div>`;
  const data=await loadQpcPage(pg);
  const host=document.getElementById("mushafPage");if(!host)return;
  if(!data){host.innerHTML=`<div style="padding:40px;text-align:center;color:var(--text-muted)">Нет данных для страницы ${pg}</div>`;}
  else{
    // header & basmala occupy their own lines above each surah's first ayah line
    const headerAt={},basmalaAt={};
    for(const s of (data.starts||[])){
      const hasB=s.surah!==1&&s.surah!==9;
      const hl=s.line-(hasB?2:1);if(hl>=1)headerAt[hl]=s.surah;
      if(hasB&&s.line-1>=1)basmalaAt[s.line-1]=s.surah;
    }
    const centerSet=new Set(data.center||[]);
    const framed=pg<=2; // first two pages are decorative/framed → centered, not justified
    let html="";
    for(let ln=1;ln<=15;ln++){
      if(headerAt[ln]!=null){
        const su=SURAHS.find(x=>x.id===headerAt[ln]);
        html+=`<div class="m-surah-head"><span class="m-surah-name">سورة ${su?su.name:''}</span></div>`;
      }else if(basmalaAt[ln]!=null){
        html+=`<div class="m-basmala">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>`;
      }else if(data.lines[String(ln)]){
        html+=mushafGlyphLine(pack,data.lines[String(ln)],framed||centerSet.has(ln));
      }else{
        html+=`<div class="m-line m-empty"></div>`;
      }
    }
    host.innerHTML=html;
    // measure & fit only after the page glyph font is actually loaded
    try{await document.fonts.ready;}catch(e){}
    fitMushafLines(host);
    // re-fit when the column width changes (orientation / window resize), so the
    // scale always matches the CURRENT column and never overflows
    if(mushafResizeObs){mushafResizeObs.disconnect();mushafResizeObs=null;}
    let lastFitW=host.clientWidth;
    mushafResizeObs=new ResizeObserver(()=>{
      if(!document.body.contains(host)){mushafResizeObs.disconnect();mushafResizeObs=null;return;}
      const w=host.clientWidth;
      if(Math.abs(w-lastFitW)<1)return; // ignore height-only changes
      lastFitW=w;fitMushafLines(host);
    });
    mushafResizeObs.observe(host);
  }
  // prev/next handled by the shared bottom navigation bar
}

// --- Word-by-word mode: grid of words + per-word gloss ----------------------
// Each word is a QPC glyph (reused from the per-surah pack data, aligned 1:1
// with the corpus by position) carrying data-loc="surah:ayah:word". The gloss
// shown is the VERBATIM English gloss (display-only); tapping a word opens the
// corpus grammar card (Russian). data/wbw chunks load lazily per surah.
async function renderWbw(el){
  const surah=ST.surah;
  const ayahIds=getAyahIds(surah);
  el.innerHTML=`<div class="wbw" id="wbwArea"><div style="text-align:center;color:var(--text-muted);padding:30px">Загрузка…</div></div>`;
  loadWbwMorph(surah); // warm this surah's grammar data so the first tap is instant
  const pack=PACKS.qpc1;
  const [qpc,words]=await Promise.all([loadPackSurah("qpc1",surah),loadWbwWords(surah)]);
  const area=document.getElementById("wbwArea");
  if(!area)return;
  if(!qpc){area.innerHTML=`<div style="text-align:center;color:var(--text-muted);padding:30px">Нет пословных данных для этой суры</div>`;return;}
  let html="";
  for(const aid of ayahIds){
    const entry=qpc[String(aid)];if(!entry)continue;
    const wg=words&&words[String(aid)];
    let cells="";
    entry.w.forEach((wp,i)=>{
      const pos=i+1,loc=`${surah}:${aid}:${pos}`,g=wp[0],p=wp[1];
      ensurePageFont(pack,p);
      const wn=wg&&wg[String(pos)];const gl=(wn&&(wn.ru||wn.en))||"";
      cells+=`<span class="wbw-cell" data-loc="${loc}">
        <span class="wbw-ar" style="font-family:'${pack.fontFamily(p)}'">${g}</span>
        <span class="wbw-gl">${esc(gl)}</span></span>`;
    });
    let endG="";
    if(entry.e){ensurePageFont(pack,entry.e[1]);endG=`<span class="wbw-end" style="font-family:'${pack.fontFamily(entry.e[1])}'">${entry.e[0]}</span>`;}
    html+=`<div class="wbw-ayah" data-aid="${aid}">
      <div class="wbw-head"><span class="wbw-num">${surah}:${aid}</span></div>
      <div class="wbw-grid">${cells}${endG}</div></div>`;
  }
  html+=`<div class="wbw-attr">Русский пословный глосс — наш черновой перевод (сверка по смыслу с переводом Э. Кулиева; сам перевод Кулиева не распространяется). Английский глосс: <a href="https://github.com/hablullah/data-quran" target="_blank" rel="noopener">data-quran</a> (CC BY-NC-ND, без изменений). Грамматический разбор: <a href="http://corpus.quran.com" target="_blank" rel="noopener">Quranic Arabic Corpus</a> (GPL).</div>`;
  area.innerHTML=html;
  if(ST.scrollToAyah!=null){const t=area.querySelector(`.wbw-ayah[data-aid="${ST.scrollToAyah}"]`);if(t)t.scrollIntoView({block:"start"});ST.scrollToAyah=null;}
}
