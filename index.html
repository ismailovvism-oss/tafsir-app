  // explicit two-mode segmented switch (clearer than a lone "Мусхаф" toggle)
  const modeSeg=`<span class="seg seg-sm"><button class="${!ST.pageMode&&!ST.wbwMode&&!ST.srcMode?'on':''}" onclick="setMode('ayat')" title="Аяты + перевод">Аяты</button>${ST.noTouch?'':`<button class="${!ST.pageMode&&ST.wbwMode&&!ST.srcMode?'on':''}" onclick="setMode('words')" title="Пословный перевод + грамматика">Слова</button>`}<button class="${ST.pageMode?'on':''}" onclick="setMode('page')" title="Постраничный мусхаф">Мусхаф</button><button class="${ST.srcMode?'on':''}" onclick="setMode('source')" title="Чтение по покрытию одного источника">Источник</button></span>`;
  if(ST.srcMode){
    // при чтении заголовок = сура (как обычно); имя источника живёт в его компактной шапке (без дубля)
    const ttl=ST.srcSel?`${su.ru} <span class="ar">${su.name}</span>`:"📖 Выбор источника";
    bar.innerHTML=`<div class="cb-left"><h2>${ttl}</h2></div><div class="cb-right">${modeSeg}${viewBtn}</div>`;return;
  }
  if(ST.pageMode){
    const loc=pageLocation(ST.mushafPage);
    bar.innerHTML=`<div class="cb-left"><h2>${loc}</h2></div><div class="cb-right">${modeSeg}${ntBtn}${viewBtn}</div>`;return;
  }
  bar.innerHTML=`<div class="cb-left"><h2>${su.ru} <span class="ar">${su.name}</span></h2></div><div class="cb-right">${modeSeg}${ntBtn}${layoutBtn}${viewBtn}</div>`;
}

// -- CENTER BODY --
function renderCenter(){
  const el=document.getElementById("centerBody");
  if(ST.bookIntro)return renderBookIntro(el);
  if(ST.scanSource)return renderScanReader(el);
  if(ST.srcMode)return renderSourceMode(el);
  if(ST.selectedTag)return renderTagResults(el);
  if(ST.pageMode)return renderMushafPage(el);
  if(ST.wbwMode)return renderWbw(el);
  return renderReading(el);
}

// Вступление к суре: текст под ключом "0" в чанке суры (фадаиль, мекканская/мединская,
// причины ниспослания…). Показывается единым блоком НАД аятом 1, без виртуализации.
function buildSuraIntro(enabled,loaded){
  let inner="";
  for(const t of enabled){
    if(t.id==="_notes")continue;
    const text=loaded[t.id]?.["0"];
    if(!text)continue;
    const isAr=t.lang==="ar";
    const {body,notes}=splitNotes(text);
    const src=body||text;
    const long=!ST.noTouch&&src.length>600;   // длинное вступление сворачиваем, как тафсиры
    inner+=`<div class="ab-entry">
      <div class="ab-entry-label">${esc(t.name)} <span class="lbl-ar">${t.nameAr||''}</span> · <span class="intro-tag">введение к суре</span></div>
      <div class="ab-entry-text md selectable ${isAr?'rtl':''} ${long?'clamped':''}">${renderRefs(src)}</div>
      ${long?'<button class="more-btn" onclick="toggleClamp(this)">Развернуть ▾</button>':''}
      ${notes.length?renderFootnotes(notes):''}
    </div>`;
  }
  if(!inner)return "";
  return `<div class="ayah-block sura-intro" data-aid="intro"><div class="sura-intro-head">📖 Вступление к суре</div>${inner}</div>`;
}

// Build the entries (Arabic + tafsirs + notes) for one ayah — used on demand by virtualization
function buildAyahBody(aid,enabled,loaded){
  let html="";
  // Arabic Quran-text variants (с огласовками / без огласовок / …) — each as its own line
  const qts=getEnabledQuranTexts();
  const multiQ=qts.length>1;
  const pack=activePack();const qpcData=loaded["__qpc"];
  for(const qt of qts){
    const lbl=multiQ?`<div class="ab-entry-label">${esc(qt.name)} <span class="lbl-ar">${qt.nameAr||''}</span></div>`:"";
    // Печатный мусхаф (QPC): главный огласованный текст рисуем глифами страницы
    if(pack&&qt.id==="_arabic"&&qpcData&&qpcData[String(aid)]){
      html+=`<div class="ab-entry">${lbl}${renderPackAyah(pack,qpcData[String(aid)])}</div>`;
      continue;
    }
    const at=loaded[qt.id]?.[String(aid)];
    if(!at)continue;
    html+=`<div class="ab-entry">${lbl}<div class="ab-entry-text arabic-main selectable">${at}</div></div>`;
  }
  // Заголовки групп «Переводы»/«Тафсиры» под аятом — только если включены оба вида сразу.
  const realSrc=enabled.filter(t=>t.id!=="_notes");
  const hasTr=realSrc.some(t=>t.kind!=="tafsir"),hasTaf=realSrc.some(t=>t.kind==="tafsir");
  const splitGroups=hasTr&&hasTaf;
  let shownTr=false,shownTaf=false;
  for(const t of enabled){
    if(t.id==="_notes"){
      const note=getNote(ST.surah,aid);
      html+=`<div class="ab-entry" style="background:var(--note-bg)">
        <div class="ab-entry-label" style="color:var(--note-color)">📝 Мои заметки</div>
        <textarea class="ab-note-area" placeholder="Ваши мысли..." oninput="saveNote(${ST.surah},${aid},this.value)">${esc(note)}</textarea>
      </div>`;
    } else {
      if(splitGroups){
        if(t.kind==="tafsir"&&!shownTaf){html+=`<div class="ab-group-head">📚 Тафсиры</div>`;shownTaf=true;}
        else if(t.kind!=="tafsir"&&!shownTr){html+=`<div class="ab-group-head">🌐 Переводы</div>`;shownTr=true;}
      }
      html+=sourceEntryHTML(t,loaded[t.id]?.[String(aid)]||null,aid);
    }
  }
  // «Показать только здесь»: разовый показ источников у ЭТОГО аята, помимо постоянных.
  for(const id of adHocIds(ST.surah,aid)){
    if(ST.enabled[id])continue;                    // уже показывается постоянно — не дублируем
    const t=CONFIG.tafsirs.find(x=>x.id===id);if(!t)continue;
    let text=loaded[id]?.[String(aid)]||null;
    // на блочном аяте при разовом показе разворачиваем ПОЛНЫЙ текст блока прямо здесь
    const blk=text?parseBlockRef(text):null;
    let blockOf=null;
    if(blk){const bt=loaded[id]?.[String(blk.target)];if(bt){text=bt;blockOf=[blk.from,blk.to];}}
    html+=sourceEntryHTML(t,text,aid,true,blockOf);
  }
  return html;
}
// Свёрнутость групп «Переводы»/«Тафсиры» в попапе аята и в окне выбора источника.
// По умолчанию переводы свёрнуты (длинный список) — ST.collapsedKinds.translation=true.
function kindCollapsed(k){return !!ST.collapsedKinds[k];}
function setKindCollapsed(k){
  ST.collapsedKinds=Object.assign({},ST.collapsedKinds,{[k]:!ST.collapsedKinds[k]});
  ss("collapsedKinds",ST.collapsedKinds);
}
function covToggleKind(aid,k){setKindCollapsed(k);refreshCovPopup(aid);}
function pickToggleKind(k){setKindCollapsed(k);renderCenter();}
// HTML одной колонки источника у аята. Распознаёт блочную отсылку «см. аят Z».
// adhoc=true → плашка «разовый показ» с кнопкой убрать. blockOf=[from,to] → текст блока.
function sourceEntryHTML(t,text,aid,adhoc,blockOf){
  const isAr=t.lang==="ar";
  const badge=adhoc?`<button class="cov-adhoc-x" onclick="removeAdHoc(${aid},'${escAttr(t.id)}')" title="Убрать разовый показ">только здесь ✕</button>`:"";
  const blk=(!blockOf&&text)?parseBlockRef(text):null;
  if(blk){
    return `<div class="ab-entry"${adhoc?' style="border-left:2px solid var(--accent)"':''}>
      <div class="ab-entry-label">${esc(t.name)} <span class="lbl-ar">${t.nameAr||''}</span>${badge}</div>
      <div class="cov-blockref">📎 Разобрано в блоке <b>${blk.from}–${blk.to}</b> <button class="cov-goto" onclick="goAyah(${ST.surah},${blk.target})">перейти к аяту ${blk.target} →</button></div>
    </div>`;
  }
  const {body,notes}=text?splitNotes(text):{body:null,notes:[]};
  const inner=body?renderRefs(body):'<span style="color:var(--text-muted)">—</span>';
  const long=!ST.noTouch&&body&&body.length>600; // в режиме без касания — сразу развёрнуто, без кнопки
  const blockNote=blockOf?`<div class="cov-blocknote">показан блок ${blockOf[0]}–${blockOf[1]} (этот аят входит в него)</div>`:"";
  return `<div class="ab-entry"${adhoc?' style="border-left:2px solid var(--accent)"':''}>
    <div class="ab-entry-label">${esc(t.name)} <span class="lbl-ar">${t.nameAr||''}</span>${badge}</div>
    ${blockNote}
    <div class="ab-entry-text md selectable ${isAr?'rtl':''} ${long?'clamped':''}">${inner}</div>
    ${long?'<button class="more-btn" onclick="toggleClamp(this)">Развернуть ▾</button>':''}
    ${notes.length?renderFootnotes(notes):''}
  </div>`;
}
// ad-hoc «показать только здесь»
function adHocIds(s,a){return ST.adHoc[s+":"+a]||[];}
function addAdHoc(a,id){
  const k=ST.surah+":"+a;const l=ST.adHoc[k]||(ST.adHoc[k]=[]);
  if(!l.includes(id))l.push(id);
  loadChunk(id,ST.surah).then(()=>renderCenter());
}
function removeAdHoc(a,id){
  const k=ST.surah+":"+a;const l=ST.adHoc[k];if(!l)return;
  const i=l.indexOf(id);if(i>=0)l.splice(i,1);if(!l.length)delete ST.adHoc[k];
  renderCenter();
}

// === Уровень 1: список ВСЕХ источников у аята (есть/нет), отдельно Переводы и Тафсиры ===
function covRowHTML(t,aid,has,adh){
  const got=has.has(t.id);
  const on=!!ST.enabled[t.id];
  let acts;
  if(!got){acts=`<span class="cov-act-na">нет у этого аята</span>`;}
  else if(on){acts=`<span class="cov-act-on">✓ показывается</span>`;}
  else if(adh.has(t.id)){acts=`<button class="cov-act" onclick="removeAdHoc(${aid},'${escAttr(t.id)}');refreshCovPopup(${aid})">✕ убрать</button>`;}
  else{acts=`<button class="cov-act" onclick="addAdHoc(${aid},'${escAttr(t.id)}');refreshCovPopup(${aid})" title="Разовый показ только у этого аята">только здесь</button>
            <button class="cov-act prim" onclick="covEnableEverywhere('${escAttr(t.id)}')" title="Показывать всюду, где этот источник есть">постоянно</button>`;}
  return `<div class="cov-row">
    <span class="cov-tick ${got?'on':'off'}">${got?'✓':'—'}</span>
    <span class="cov-name ${got?'':'muted'}">${esc(t.name)}</span>
    <span class="cov-acts">${acts}</span></div>`;
}
function covPopupHTML(aid){
  const has=new Set(covSourcesForAyah(ST.surah,aid));
  const adh=new Set(adHocIds(ST.surah,aid));
  const inIdx=CONFIG.tafsirs.filter(t=>COV.sources[t.id]);
  const tr=inIdx.filter(t=>t.kind!=="tafsir");
  const taf=inIdx.filter(t=>t.kind==="tafsir");
  const c=covCountByKind(ST.surah,aid);
  const grp=(kind,title,items)=>{
    if(!items.length)return"";
    const col=kindCollapsed(kind);
    const head=`<div class="cov-grp-head clickable ${col?'collapsed':''}" onclick="covToggleKind(${aid},'${kind}')" title="Свернуть/развернуть">${title} · ${items.length} <span class="grp-chev">${col?'▸':'▾'}</span></div>`;
    return head+(col?"":items.map(t=>covRowHTML(t,aid,has,adh)).join(""));
  };
  return `<div class="tag-popup-head"><span>📖 Аят ${aid} · 🌐 ${c.tr} · 📚 ${c.taf}</span><button class="tag-popup-close" onclick="closeCovPopup()">✕</button></div>
    <div class="tag-popup-list">${grp("translation","🌐 Переводы",tr)}${grp("tafsir","📚 Тафсиры",taf)}</div>
    <div class="cov-popup-foot"><button class="cov-act" onclick="closeCovPopup();setMode('source')" title="Открыть режим чтения по источнику">режим источника…</button></div>`;
}
function openCovPopup(aid,btnEl){
  if(ST.noTouch)return;
  closeCovPopup();
  const rect=btnEl.getBoundingClientRect();
  const popup=document.createElement("div");
  popup.className="tag-popup";popup.id="covPopup";
  popup.style.position="fixed";
  popup.style.top=Math.min(rect.bottom+4,window.innerHeight-330)+"px";
  popup.style.left=Math.min(rect.left,window.innerWidth-290)+"px";
  popup.innerHTML=covPopupHTML(aid);
  document.body.appendChild(popup);
  setTimeout(()=>document.addEventListener("click",closeCovOnOutside),10);
}
function refreshCovPopup(aid){
  const popup=document.getElementById("covPopup");if(popup)popup.innerHTML=covPopupHTML(aid);
}
function closeCovPopup(){
  const p=document.getElementById("covPopup");if(p)p.remove();
  document.removeEventListener("click",closeCovOnOutside);
}
function closeCovOnOutside(e){
  const p=document.getElementById("covPopup");if(!p)return;
  if(p.contains(e.target))return;
  if(e.target.closest("[onclick*='openCovPopup']"))return;
  closeCovPopup();
}
function covEnableEverywhere(id){
  if(!ST.enabled[id]){ST.enabled[id]=true;setEnabled(ST.enabled);}
  closeCovPopup();renderRP();renderCenter();
}
// из попапа аята — ярлык: открыть 4-й режим сразу на этом источнике
function enterSourceMode(id){
  if(!COV.sources[id])return;
  closeCovPopup&&closeCovPopup();
  setSrcSel(id);
}
// Покрывает ли выбранный источник суру s (для подсветки навигации).
function srcCoversSurah(s){return ST.srcMode&&ST.srcSel&&!!covPairs(ST.srcSel,s);}
// Выбрать источник для чтения (вход в чтение по покрытию).
function setSrcSel(id){
  if(!COV.sources[id])return;
  ST.srcMode=true;ST.srcSel=id;ST.pageMode=false;ST.wbwMode=false;ST.selectedTag=null;ST.bookIntro=false;
  ST.expandedGaps={};
  if(!covPairs(id,ST.surah)){                       // текущая сура не покрыта → к первому покрытому аяту
    const nx=covNextAyah(id,0,0,1);if(nx){ST.surah=nx.surah;ST.scrollToAyah=nx.ayah;pushSurahHash&&pushSurahHash(ST.surah);}
  }
  renderCB();renderBottomNav();renderSB();renderCenter();
}
// Вернуться к списку/карте источников (сменить источник), оставаясь в режиме.
function srcBackToPicker(){ST.srcSel=null;renderCB();renderBottomNav();renderSB();renderCenter();}
function setGapMode(m){ST.gapMode=m;ST.expandedGaps={};renderCenter();}
// Свернуть/развернуть компактную шапку режима источника (без перерисовки всего экрана).
function toggleSrcBar(btn){
  ST.srcBarOpen=!ST.srcBarOpen;ss("srcBarOpen",ST.srcBarOpen);
  const bar=document.getElementById("srcModeBar");
  if(bar)bar.classList.toggle("open",ST.srcBarOpen);
  if(btn)btn.textContent=ST.srcBarOpen?"▾":"⚙";
}
function toggleGapExpand(key){if(ST.expandedGaps[key])delete ST.expandedGaps[key];else ST.expandedGaps[key]=true;renderCenter();}
// Навигация по покрытию: прыжок к след./пред. покрытому аяту (через суры).
function covNav(dir){
  const id=ST.srcSel;if(!id)return;
  const top=curTopAyah()||1;
  const nx=covNextAyah(id,ST.surah,top,dir);
  if(!nx)return;   // дальше/раньше покрытых аятов нет — кнопка просто бездействует
  if(nx.surah!==ST.surah){ST.surah=nx.surah;renderSB();}
  ST.scrollToAyah=nx.ayah;
  pushSurahHash&&pushSurahHash(ST.surah);
  renderCenter();
}
// Разбиение аятов суры на элементы: покрытые аяты + полоски разрывов (с учётом gapMode).
function sourceModeItems(id,ayahIds){
  const items=[];let gapStart=null;
  const flushGap=(end)=>{
    if(gapStart==null)return;
    if(ST.gapMode==="show"){for(let a=gapStart;a<=end;a++)items.push({ayah:a,covered:false});}
    else if(ST.gapMode==="collapse"){
      const key=ST.surah+":"+gapStart+"-"+end;
      if(ST.expandedGaps[key]){items.push({gapHead:[gapStart,end],expanded:true});for(let a=gapStart;a<=end;a++)items.push({ayah:a,covered:false});}
      else items.push({gap:[gapStart,end]});
    } // "hide" → ничего
    gapStart=null;
  };
  for(const aid of ayahIds){
    if(covHas(id,ST.surah,aid)){flushGap(aid-1);items.push({ayah:aid,covered:true});}
    else{if(gapStart==null)gapStart=aid;}
  }
  flushGap(ayahIds[ayahIds.length-1]);
  return items;
}
// Экран 4-го режима: нет выбранного источника → карта+выбор; иначе чтение по покрытию.
async function renderSourceMode(el){
  if(!ST.srcSel||!COV.sources[ST.srcSel])return renderSourcePicker(el);
  const id=ST.srcSel;
  const src=CONFIG.tafsirs.find(t=>t.id===id);
  if(!src){srcBackToPicker();return;}
  const ayahIds=getAyahIds(ST.surah);
  const quranTexts=getEnabledQuranTexts();
  const enabled=[src];                                  // в режиме источника показываем ТОЛЬКО его (+ Коран)
  el.innerHTML=`<div id="srcModeBar"></div><div class="reading" id="readingArea"><div style="text-align:center;color:var(--text-muted);padding:30px">Загрузка...</div></div>`;
  const loaded={};
  await Promise.all([src,...quranTexts].map(async t=>{loaded[t.id]=await loadChunk(t.id,ST.surah);}));
  if(activePack())loaded["__qpc"]=await loadPackSurah(ST.arFont,ST.surah);

  // компактная сворачиваемая панель режима источника (по умолчанию — одна строка)
  const su=SURAHS.find(s=>s.id===ST.surah);
  const gm=ST.gapMode;
  const gbtn=(m,lbl,t)=>`<button class="src-gap-b ${gm===m?'on':''}" onclick="setGapMode('${m}')" title="${t}">${lbl}</button>`;
  const inThisSurah=!!covPairs(id,ST.surah);
  const kindRu=src.kind==="tafsir"?"тафсир":"перевод";
  const pct=Math.round(COV.sources[id].n*100/COV.total);
  const open=ST.srcBarOpen;
  document.getElementById("srcModeBar").outerHTML=`<div id="srcModeBar" class="src-bar ${open?'open':''}">
    <div class="src-bar-top">
      <button class="src-back" onclick="srcBackToPicker()" title="К списку источников">‹</button>
      <span class="src-name" title="${escAttr(src.name)}">📖 ${esc(src.name)} <span class="src-kind">${kindRu}</span></span>
      <span class="src-pct">${pct}%</span>
      <span class="src-top-spacer"></span>
      <button class="src-nav" onclick="covNav(-1)" title="Предыдущий покрытый аят">◀</button>
      <button class="src-nav" onclick="covNav(1)" title="Следующий покрытый аят">▶</button>
      <button class="src-cog" onclick="toggleSrcBar(this)" title="Настройки режима источника">${open?'▾':'⚙'}</button>
    </div>
    <div class="src-extra">
      <div class="src-bar-row src-extent">Охват: ${covExtentText(id)}${inThisSurah?'':` · <b>в суре «${esc(su?su.ru:ST.surah)}» источника нет</b>`} <span class="src-ar">${src.nameAr||''}</span></div>
      <div class="src-bar-row">
        <span class="src-gap-lbl">Разрывы:</span>
        ${gbtn('show','серым','Показывать непокрытые аяты заглушкой')}
        ${gbtn('collapse','схлопнуть','Сворачивать подряд идущие непокрытые в одну полоску')}
        ${gbtn('hide','скрыть','Скрывать непокрытые совсем')}
      </div>
    </div>
  </div>`;

  const area=document.getElementById("readingArea");
  if(!area)return;
  const items=sourceModeItems(id,ayahIds);
  let html="";
  if(!items.length){html=`<div style="text-align:center;color:var(--text-muted);padding:40px">В этой суре у источника нет покрытия.<br>Нажмите «след. ▶» для перехода к покрытию.</div>`;}
  for(const it of items){
    if(it.gap){
      const [f,t]=it.gap;const key=ST.surah+":"+f+"-"+t;
      const label=f===t?`аят ${f}`:`аяты ${f}–${t}`;
      html+=`<div class="cov-gap-strip" onclick="toggleGapExpand('${key}')">⋯ ${label} — нет толкования <span class="cov-gap-exp">развернуть ▾</span></div>`;
      continue;
    }
    if(it.gapHead){const [f,t]=it.gapHead;const key=ST.surah+":"+f+"-"+t;
      html+=`<div class="cov-gap-strip open" onclick="toggleGapExpand('${key}')">⋯ аяты ${f}–${t} — нет толкования <span class="cov-gap-exp">свернуть ▴</span></div>`;
      continue;}
    const aid=it.ayah;
    const hn=hasNote(ST.surah,aid);const ht=hasAT(ST.surah,aid);
    html+=`<div class="ayah-block ${it.covered?'':'uncovered'}" data-aid="${aid}"><div class="ab-head">
      <div style="display:flex;align-items:center;gap:8px"><span class="ab-num">${aid}</span>
        <button class="cov-cnt-btn" onclick="event.stopPropagation();openCovPopup(${aid},this)" title="Переводов и тафсиров">${covCountLabel(ST.surah,aid)}</button>
        <button class="ab-bm-btn ${isBookmarked(ST.surah,aid)?'on':''}" onclick="event.stopPropagation();toggleBookmark(${aid},this)" title="Закладка">${isBookmarked(ST.surah,aid)?'★':'☆'}</button>
        <button class="ab-note-btn ${hn?'has':''}" onclick="event.stopPropagation();toggleNote(${aid},this)" title="Заметка к аяту">📝</button>
        ${it.covered?'':'<span class="uncov-tag">нет толкования</span>'}
      </div>
      <div class="ab-tag-dots">${hn?'<span class="ab-note-dot"></span>':''}</div>
    </div><div class="ab-body" data-aid="${aid}" style="min-height:40px"></div></div>`;
  }
  area.innerHTML=html;
  setupHydration(area,enabled,loaded);
  if(ST.scrollToAyah!=null){const t=area.querySelector(`.ayah-block[data-aid="${ST.scrollToAyah}"]`);if(t)t.scrollIntoView({block:"start"});ST.scrollToAyah=null;}
  lastReadingSurah=ST.surah;
}

// Экран ВЫБОРА источника = компактная карта покрытия (Переводы/Тафсиры), скроллится.
function renderSourcePicker(el){
  const byKind={translation:[],tafsir:[]};
  for(const t of CONFIG.tafsirs){if(COV.sources[t.id]&&byKind[t.kind])byKind[t.kind].push(t);}
  const section=(kind,title,icon,items)=>{
    if(!items.length)return"";
    const col=kindCollapsed(kind);
    let h=`<div class="srcp-gname clickable ${col?'collapsed':''}" onclick="pickToggleKind('${kind}')" title="Свернуть/развернуть">${icon} ${title} · ${items.length} <span class="grp-chev">${col?'▸ показать':'▾'}</span></div>`;
    if(col)return h;
    for(const t of items){
      const src=COV.sources[t.id];const pct=Math.round(src.n*100/COV.total);
      const full=pct>=100;const cls=full?'full':(pct>=50?'mid':'low');
      h+=`<button class="srcp-item" onclick="setSrcSel('${escAttr(t.id)}')">
        <div class="srcp-row1"><span class="srcp-name">${esc(t.name)}</span><span class="srcp-pct ${cls}">${pct}%</span></div>
        <div class="srcp-bar"><div class="srcp-bar-fill ${cls}" style="width:${pct}%"></div></div>
        <div class="srcp-extent">${full?'полное · 114 сур':covExtentText(t.id)}</div>
      </button>`;
    }
    return h;
  };
  el.innerHTML=`<div class="src-picker">
    <div class="srcp-head">📖 Чтение по источнику</div>
    <div class="srcp-sub">Выберите перевод или тафсир — читать будете по его покрытию, разрывы сворачиваются. Видно, у кого сколько и где дыры.</div>
    ${section("tafsir","Тафсиры","📚",byKind.tafsir)}
    ${section("translation","Переводы","🌐",byKind.translation)}
  </div>`;
}

// Virtualization: hydrate ayah bodies near the viewport, empty those far away (cap DOM size)
function setupHydration(area,enabled,loaded){
  if(hydrationObserver){hydrationObserver.disconnect();hydrationObserver=null;}
  const obs=new IntersectionObserver(entries=>{
    for(const e of entries){
      const el=e.target;
      if(e.isIntersecting){
        if(el.dataset.hyd!=="1"){el.innerHTML=buildAyahBody(+el.dataset.aid,enabled,loaded);el.dataset.hyd="1";el.style.minHeight="";}
      }else if(el.dataset.hyd==="1"){
        const h=el.offsetHeight;
        if(h)el.style.minHeight=h+"px"; // freeze height so scroll position is preserved
        el.innerHTML="";el.dataset.hyd="0";
      }
    }
  },{root:area,rootMargin:"1200px 0px"});
  area.querySelectorAll(".ab-body").forEach(b=>obs.observe(b));
  hydrationObserver=obs;
}

// Заметка к ОДНОМУ аяту (кнопка 📝 в панели аята) — инлайн-редактор прямо под панелью.
// Вставляется в .ayah-block, переживает виртуализацию; при смене суры — сбрасывается.
function toggleNote(aid,btn){
  if(ST.noTouch)return;
  const block=btn.closest(".ayah-block");if(!block)return;
  const ex=block.querySelector(".ab-note-inline");
  if(ex){ex.remove();btn.classList.toggle("on",false);btn.classList.toggle("has",hasNote(ST.surah,aid));return;}
  btn.classList.add("on");
  const div=document.createElement("div");div.className="ab-note-inline";
  div.innerHTML=`<div class="ab-note-bar"><button class="ab-note-expand" onclick="openNoteEditor(${ST.surah},${aid})" title="Развернуть на весь экран с форматированием">⤢ Развернуть</button></div>`+
    `<textarea class="ab-note-area" placeholder="Заметка к аяту ${aid}…" oninput="noteInput(this,${aid})">${esc(getNote(ST.surah,aid))}</textarea>`;
  block.appendChild(div);
  const ta=div.querySelector("textarea");if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}
}
// Сохранение + живое обновление индикатора заметки (точка + подсветка кнопки).
function noteInput(ta,aid){
  saveNote(ST.surah,aid,ta.value);
  const block=ta.closest(".ayah-block");if(!block)return;
  const has=hasNote(ST.surah,aid);
  const btn=block.querySelector(".ab-note-btn");if(btn)btn.classList.toggle("has",has);
  const dots=block.querySelector(".ab-tag-dots");if(dots)dots.innerHTML=has?'<span class="ab-note-dot"></span>':'';
  renderF();
}

// ── Большой редактор заметки (модал на весь экран) ──────────────────────────
// Хранилище — то же (getNote/setNote), исходник остаётся markdown. Предпросмотр
// рендерит тем же движком mdRender, что и тафсиры/паспорт (HTML экранируется внутри).
let noteEd=null; // {s,a} — какой аят редактируем
function openNoteEditor(s,a){
  if(ST.noTouch)return;
  noteEd={s,a};
  let ov=document.getElementById("neOvl");
  if(!ov){ov=document.createElement("div");ov.id="neOvl";ov.className="ne-ovl";
    ov.onclick=e=>{if(e.target===ov)closeNoteEditor();};document.body.appendChild(ov);}
  const tb=(t,title,inner)=>`<button class="ne-btn" onclick="neFmt('${t}')" title="${title}">${inner}</button>`;
  ov.innerHTML=`<div class="ne-box" data-m="edit" role="dialog" aria-modal="true">
    <div class="ne-head">
      <span class="ne-title">📝 Заметка · аят ${a}</span>
      <span class="ne-modes">
        <button class="ne-mode on" data-m="edit" onclick="neMode('edit')">✏ Правка</button>
        <button class="ne-mode" data-m="preview" onclick="neMode('preview')">👁 Просмотр</button>
      </span>
      <button class="ne-close" onclick="closeNoteEditor()" aria-label="Закрыть">×</button>
    </div>
    <div class="ne-toolbar">
      ${tb('bold','Жирный','<b>Ж</b>')}${tb('italic','Курсив','<i>К</i>')}${tb('mono','Моноширинный','&lt;/&gt;')}
      <span class="ne-sep"></span>
      ${tb('h','Заголовок','H')}${tb('quote','Цитата','❝')}${tb('ul','Список','•')}${tb('ol','Нумерованный список','1.')}
      <span class="ne-sep"></span>
      ${tb('hr','Линия','―')}${tb('table','Таблица','▦')}${tb('card','Карточка [[ ::подсказка ]]','[[ ]]')}
    </div>
    <div class="ne-body">
      <div class="ne-pane edit"><textarea id="neArea" class="ne-area" placeholder="Пишите заметку… поддерживается markdown: **жирный**, *курсив*, &gt; цитата, # заголовок, списки, | таблицы |" oninput="neInput()">${esc(getNote(s,a))}</textarea></div>
      <div class="ne-pane preview"><div id="nePreview" class="ne-preview md"></div></div>
    </div>
  </div>`;
  ov.style.display="flex";
  neInput(); // первичный предпросмотр
  const ta=document.getElementById("neArea");if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}
}
function neMode(m){
  const box=document.querySelector("#neOvl .ne-box");if(!box)return;
  box.dataset.m=m;box.querySelectorAll(".ne-mode").forEach(b=>b.classList.toggle("on",b.dataset.m===m));
  if(m==="preview")neInput();
  else{const ta=document.getElementById("neArea");if(ta)ta.focus();}
}
// Автосохранение по вводу + живой предпросмотр (то же хранилище, что у инлайн-поля).
function neInput(){
  if(!noteEd)return;
  const ta=document.getElementById("neArea");if(!ta)return;
  saveNote(noteEd.s,noteEd.a,ta.value);
  const pv=document.getElementById("nePreview");
  if(pv)pv.innerHTML=ta.value.trim()?mdRender(ta.value):'<span style="color:var(--text-muted)">Здесь появится предпросмотр…</span>';
}
// Оборачивание выделения / вставка markdown — только синтаксис, который умеет mdRender.
function neWrap(before,after,placeholder){
  const ta=document.getElementById("neArea");if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd,v=ta.value;
  const sel=v.slice(s,e)||placeholder||"текст";
  ta.value=v.slice(0,s)+before+sel+after+v.slice(e);
  ta.focus();ta.setSelectionRange(s+before.length,s+before.length+sel.length);
  neInput();
}
function neLinePrefix(prefix){
  const ta=document.getElementById("neArea");if(!ta)return;
  const v=ta.value,s=ta.selectionStart,e=ta.selectionEnd;
  const ls=v.lastIndexOf("\n",s-1)+1;
  let le=v.indexOf("\n",e);if(le<0)le=v.length;
  const seg=v.slice(ls,le)||"текст";
  const newSeg=seg.split("\n").map(l=>prefix+l).join("\n");
  ta.value=v.slice(0,ls)+newSeg+v.slice(le);
  ta.focus();ta.setSelectionRange(ls,ls+newSeg.length);
  neInput();
}
function neInsert(text){
  const ta=document.getElementById("neArea");if(!ta)return;
  const s=ta.selectionStart,v=ta.value;
  ta.value=v.slice(0,s)+text+v.slice(ta.selectionEnd);
  const pos=s+text.length;ta.focus();ta.setSelectionRange(pos,pos);
  neInput();
}
function neFmt(type){
  if(type==="bold")neWrap("**","**","жирный");
  else if(type==="italic")neWrap("*","*","курсив");
  else if(type==="mono")neWrap("`","`","код");
  else if(type==="quote")neLinePrefix("> ");
  else if(type==="h")neLinePrefix("## ");
  else if(type==="ul")neLinePrefix("- ");
  else if(type==="ol")neLinePrefix("1. ");
  else if(type==="hr")neInsert("\n\n---\n\n");
  else if(type==="table")neInsert("\n\n| Столбец | Столбец |\n| --- | --- |\n| ячейка | ячейка |\n\n");
  else if(type==="card")neWrap("[[","::подсказка]]","слово");
}
function closeNoteEditor(){
  const ov=document.getElementById("neOvl");if(ov)ov.style.display="none";
  if(noteEd){                         // синхронизируем индикаторы и инлайн-поле под аятом
    const a=noteEd.a,has=hasNote(noteEd.s,a);
    const block=document.querySelector(`.ayah-block[data-aid="${a}"]`);
    if(block){
      const btn=block.querySelector(".ab-note-btn");if(btn){btn.classList.toggle("has",has);btn.classList.remove("on");}
      const inlineTa=block.querySelector(".ab-note-inline textarea");if(inlineTa)inlineTa.value=getNote(noteEd.s,a);
      const dots=block.querySelector(".ab-tag-dots");if(dots)dots.innerHTML=has?'<span class="ab-note-dot"></span>':'';
    }
  }
  noteEd=null;renderF();
}

// Разовый показ перевода/оригинала ОДНОГО аята (кнопка ru/ar в панели аята).
// Блок вставляется в .ayah-block (рядом с .ab-body), переживает виртуализацию;
// при смене суры/режима всё перерисовывается заново — состояние само сбрасывается.
async function togglePeek(aid,btn){
  if(ST.noTouch)return;
  const block=btn.closest(".ayah-block");if(!block)return;
  const ex=block.querySelector(".ab-peek");
  if(ex){ex.remove();btn.classList.remove("on");return;}
  btn.classList.add("on");
  const kind=btn.dataset.peek;
  const lbl=kind==="ru"?"Перевод":"Оригинал";
  const div=document.createElement("div");div.className="ab-peek";
  div.innerHTML=`<span class="ab-peek-lbl">${lbl}</span><span style="color:var(--text-muted)">…</span>`;
  block.appendChild(div);
  let text="";
  if(kind==="ru"){
    const tid=(CONFIG.tafsirs.find(t=>t.lang!=="ar"&&t.group==="translations")||{}).id||"kuliev";
    await loadChunk(tid,ST.surah);text=getChunk(tid,ST.surah)?.[String(aid)]||getAnyTranslation(ST.surah,aid);
  }else{
    await loadChunk("_arabic",ST.surah);text=getArabicFromCache(ST.surah,aid);
  }
  if(!block.contains(div))return;
  div.innerHTML=`<span class="ab-peek-lbl">${lbl}</span>`+
    (kind==="ru"?`<div class="ab-peek-t md selectable">${text?mdRender(text):'—'}</div>`
                :`<div class="ab-peek-t rtl selectable">${text||'—'}</div>`);
}

async function renderReading(el){
  const ayahIds=getAyahIds(ST.surah);
  const enabledAll=getEnabledList();
  const enabled=enabledAll.filter(t=>t.kind!=="image");   // per-ayah text sources (scans are a separate reader)
  const quranTexts=getEnabledQuranTexts();
  if(!enabled.length&&!quranTexts.length){
    el.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:13px;text-align:center;padding:40px">
      <div><div style="font-size:32px;margin-bottom:10px;opacity:.3">📚</div>Включите переводы или тафсиры<br>кнопкой 📚 справа вверху</div></div>`;
    return;
  }

  // Запоминаем верхний видимый аят ДО затирания DOM, чтобы вернуть скролл на него
  // после ре-рендера той же суры (напр. при включении/выключении источника).
  let anchorAid=null;
  if(lastReadingSurah===ST.surah){
    const prevArea=el.querySelector("#readingArea");
    if(prevArea){
      // Ориентир верха: в «Колонках» вычитаем высоту липкой шапки колонок, чтобы
      // взять первый аят ПОД шапкой (а не тот, что чуть выглядывает над ней).
      let refTop=prevArea.getBoundingClientRect().top;
      const colLayout=prevArea.querySelector(".col-layout");
      if(colLayout){const h=colLayout.querySelector(".col-head");if(h)refTop=colLayout.getBoundingClientRect().top+h.getBoundingClientRect().height;}
      // .ayah-block — режим «Список»; .col-num — режим «Колонки» (ячейки колонки №)
      for(const b of prevArea.querySelectorAll(".ayah-block, .col-num")){
        if(b.getBoundingClientRect().bottom>refTop+4){anchorAid=b.dataset.aid;break;}
      }
    }
  }

  el.innerHTML=`<div class="reading" id="readingArea"><div style="text-align:center;color:var(--text-muted);padding:30px">Загрузка...</div></div>`;

  // Load only the current surah's chunk for each enabled tafsir + Arabic variant
  const loaded={};
  const toLoad=[...enabled.filter(t=>t.id!=="_notes"),...quranTexts];
  await Promise.all(toLoad.map(async t=>{loaded[t.id]=await loadChunk(t.id,ST.surah);}));
  // «Открыть здесь»: догрузить чанки разовых источников текущей суры
  const adHocSet=new Set();
  for(const k in ST.adHoc)if(k.startsWith(ST.surah+":"))for(const id of ST.adHoc[k])if(!ST.enabled[id])adHocSet.add(id);
  await Promise.all([...adHocSet].map(async id=>{loaded[id]=await loadChunk(id,ST.surah);}));
  // Mushaf pack glyphs (QPC v1 …) for the main Arabic line, if a pack font is active
  if(activePack())loaded["__qpc"]=await loadPackSurah(ST.arFont,ST.surah);

  const area=document.getElementById("readingArea");
  if(!area)return;

  // Раскладка: «Список» (h) или «Колонки» (v). На телефоне колонки скроллятся
  // горизонтально (min-width колонок задан в CSS) — раньше тут был форс в «h».
  const layout=ST.layout;
  if(layout==="h"){
    // anchorAid (верхний видимый аят) уже захвачен выше — до затирания DOM.
    // Разовый показ второй стороны одного аята: «ru» если включён только арабский,
    // «ar» если только перевод (когда есть и то и то — кнопка не нужна).
    const hasAr=quranTexts.length>0;
    const hasTr=enabled.some(t=>t.id!=="_notes"&&t.lang!=="ar");
    const peekKind=hasAr&&!hasTr?"ru":(hasTr&&!hasAr?"ar":null);
    // Lightweight skeleton: header + empty body per ayah; bodies hydrate on demand
    let html=buildSuraIntro(enabled,loaded);
    for(const aid of ayahIds){
      const hn=hasNote(ST.surah,aid);const ht=hasAT(ST.surah,aid);
      html+=`<div class="ayah-block" data-aid="${aid}"><div class="ab-head">
        <div style="display:flex;align-items:center;gap:8px"><span class="ab-num">${aid}</span>
          <button onclick="event.stopPropagation();openTagPopup(${aid},this)" style="background:${ht?'var(--tag-bg)':'var(--bg-card)'};border:1px solid ${ht?'var(--tag-color)':'var(--border)'};border-radius:4px;padding:1px 6px;cursor:pointer;font-size:11px;color:${ht?'var(--tag-color)':'var(--text-muted)'}" title="Теги">🏷${ht?' '+getATList(ST.surah,aid).length:''}</button>
          <button class="cov-cnt-btn" onclick="event.stopPropagation();openCovPopup(${aid},this)" title="Переводов и тафсиров у этого аята">${covCountLabel(ST.surah,aid)}</button>
          <button class="ab-bm-btn ${isBookmarked(ST.surah,aid)?'on':''}" onclick="event.stopPropagation();toggleBookmark(${aid},this)" title="Закладка">${isBookmarked(ST.surah,aid)?'★':'☆'}</button>
          <button class="ab-note-btn ${hn?'has':''}" onclick="event.stopPropagation();toggleNote(${aid},this)" title="Заметка к аяту">📝</button>
          ${peekKind?`<button class="ab-peek-btn" data-peek="${peekKind}" onclick="event.stopPropagation();togglePeek(${aid},this)" title="${peekKind==='ru'?'Показать перевод этого аята':'Показать оригинал этого аята'}">${peekKind}</button>`:''}
        </div>
        <div class="ab-tag-dots">${hn?'<span class="ab-note-dot"></span>':''}</div>
      </div><div class="ab-body" data-aid="${aid}" style="min-height:48px"></div></div>`;
    }
    area.innerHTML=html;
    setupHydration(area,enabled,loaded);
    // a pending jump (📑 Переход) wins over scroll-anchor preservation
    if(ST.scrollToAyah!=null){
      const t=area.querySelector(`.ayah-block[data-aid="${ST.scrollToAyah}"]`);if(t)t.scrollIntoView({block:"start"});
      ST.scrollToAyah=null;
    }else if(anchorAid){const t=area.querySelector(`.ayah-block[data-aid="${anchorAid}"]`);if(t)t.scrollIntoView({block:"start"});}
  } else {
    if(hydrationObserver){hydrationObserver.disconnect();hydrationObserver=null;}
    // Vertical columns
    const cols=[];
    for(const qt of quranTexts)cols.push({id:qt.id,name:qt.nameAr||qt.name,isArabic:true,data:loaded[qt.id]});
    for(const t of enabled){
      if(t.id==="_notes")cols.push({id:"_notes",name:"📝 Заметки",isNote:true});
      else cols.push({id:t.id,name:t.name,nameAr:t.nameAr,lang:t.lang,data:loaded[t.id]});
    }
    if(!cols.length){area.innerHTML="";return;}

    let html=`<div class="col-layout" style="height:100%;overflow:auto">`;
    html+=`<div class="col-col" style="min-width:40px;max-width:50px;flex:none"><div class="col-head">#</div>`;
    for(const aid of ayahIds)html+=`<div class="col-ayah col-num" data-aid="${aid}" style="text-align:center;font-weight:600;color:var(--accent);font-size:12px;display:flex;align-items:center;justify-content:center">${aid}</div>`;
    html+=`</div>`;

    for(const col of cols){
      html+=`<div class="col-col"><div class="col-head">${esc(col.name)}</div>`;
      for(const aid of ayahIds){
        if(col.isArabic){
          const pk=activePack();const qd=loaded["__qpc"];
          if(pk&&col.id==="_arabic"&&qd&&qd[String(aid)]){
            html+=`<div class="col-ayah">${renderPackAyah(pk,qd[String(aid)])}</div>`;
          }else{
            const arText=col.data?.[String(aid)]||"";
            html+=`<div class="col-ayah arabic-main selectable">${arText||'—'}</div>`;
          }
        } else if(col.isNote){
          const note=getNote(ST.surah,aid);
          html+=`<div class="col-ayah" style="background:var(--note-bg);padding:4px 6px"><textarea class="ab-note-area" style="min-height:30px;font-size:11px" placeholder="..." oninput="saveNote(${ST.surah},${aid},this.value)">${esc(note)}</textarea></div>`;
        } else {
          const text=col.data?.[String(aid)]||"";
          const isAr=col.lang==="ar";
          html+=`<div class="col-ayah md selectable ${isAr?'rtl':''}">${text?mdRender(text):'—'}</div>`;
        }
      }
      html+=`</div>`;
    }
    html+=`</div>`;
    area.innerHTML=html;
    // Вернуть скролл: переход (📑) важнее, иначе — на запомненный верхний аят.
    // Точное позиционирование под липкую шапку колонок (scrollIntoView её не учитывает).
    const colScrollTo=aid=>{
      const lay=area.querySelector(".col-layout");const cell=lay&&lay.querySelector(`.col-num[data-aid="${aid}"]`);
      if(!lay||!cell)return;
      const h=lay.querySelector(".col-head");const headH=h?h.getBoundingClientRect().height:0;
      lay.scrollTop+=cell.getBoundingClientRect().top-lay.getBoundingClientRect().top-headH;
    };
    if(ST.scrollToAyah!=null){colScrollTo(ST.scrollToAyah);ST.scrollToAyah=null;}
    else if(anchorAid)colScrollTo(anchorAid);
  }
  lastReadingSurah=ST.surah;
}

async function renderTagResults(el){
  const matches=ayahsForTag(ST.selectedTag);
  if(!matches.length){

    return;
  }
  // Preload chunks for the surahs referenced by the tagged ayahs (Arabic + one translation)
  const surahs=[...new Set(matches.map(m=>+m.key.split(":")[0]))];
  const firstTrans=CONFIG.tafsirs.find(t=>t.lang!=="ar"&&ST.enabled[t.id])||CONFIG.tafsirs.find(t=>t.lang!=="ar");
  await Promise.all(surahs.flatMap(s=>{
    const ps=[loadChunk("_arabic",s).catch(()=>{})];
    if(firstTrans)ps.push(loadChunk(firstTrans.id,s).catch(()=>{}));
    return ps;
  }));
  const sel=ST.selectedTag;
  let html=`<div class="tag-results"><div class="tr-header">🏷 ${esc(sel)} — ${matches.length} аятов</div>`;
  for(const m of matches){
    const[s,a]=m.key.split(":");

    const arText=getArabicFromCache(+s,+a);
    const trText=getAnyTranslation(+s,+a);
    // метка происхождения: по какому фактическому (листовому) тегу аят попал в этот список
    const pills=m.origins.map(o=>{
      const direct=o===sel.split("/").pop();       // помечен самим выбранным тегом напрямую
      return `<span class="t-pill" title="${direct?'Помечен этим тегом напрямую':'По подтегу «'+esc(o)+'»'}">${esc(o)}</span>`;
    }).join("");
    html+=`<div class="tr-ayah" onclick="ST.selectedTag=null;goSurah(${s})">
      <div class="tr-ayah-ref">${su?su.ru:s} : ${a}<span class="tr-origins">${pills}</span></div>
      ${arText?`<div class="tr-ayah-ar">${arText}</div>`:''}
      ${trText?`<div class="tr-ayah-tr">${trText}</div>`:''}
    </div>`;
  }
  el.innerHTML=html+`</div>`;
}

const FACET_LABELS={
  lang:{label:"Язык",vals:[["ar","Арабский"],["ru","Русский"]]},
  kind:{label:"Тип",vals:[["quran","Коран"],["translation","Перевод"],["tafsir","Тафсир"]]},
  era:{label:"Эпоха",vals:[["classical","Классич."],["modern","Современ."]]},
};
function tagLabel(id){const f=(CONFIG.facetTags||[]).find(x=>x.id===id);return f?f.name:id;}
function configHasFacet(key,v){return CONFIG.tafsirs.some(t=>key==="tags"?(t.tags||[]).includes(v):(t[key]||"")===v);}
function passFacets(t){
  for(const key of ["lang","kind","era"]){
    const act=ST.facets[key];
    if(act&&act.length&&!act.includes(t[key]||""))return false;
  }
  const tagAct=ST.facets.tags;
  if(tagAct&&tagAct.length){const tt=t.tags||[];if(!tagAct.some(x=>tt.includes(x)))return false;}
  return true;
}
function toggleFacet(key,v){
  const a=ST.facets[key]||(ST.facets[key]=[]);
  const i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);

function clearFacets(){ST.facets={lang:[],kind:[],era:[],tags:[]};renderRP();}
function anyFacetActive(){return Object.values(ST.facets).some(a=>a&&a.length);}
function renderFacetBar(){
  let h=`<div class="rp-facets">`;
  for(const key of ["lang","kind","era"]){
    const def=FACET_LABELS[key];
    const present=def.vals.filter(([v])=>configHasFacet(key,v));
    if(present.length<1)continue;
    h+=`<div class="facet-axis"><span class="facet-axis-lbl">${def.label}</span>`;
    for(const[v,lbl]of present){
      const on=(ST.facets[key]||[]).includes(v);
      h+=`<button class="facet-chip ${on?'on':''}" onclick="toggleFacet('${key}','${v}')">${lbl}</button>`;
    }
    h+=`</div>`;
  }
  const tags=(CONFIG.facetTags||[]).filter(t=>configHasFacet("tags",t.id));
  if(tags.length){
    h+=`<div class="facet-axis"><span class="facet-axis-lbl">Направл.</span>`;
    for(const t of tags){
      const on=(ST.facets.tags||[]).includes(t.id);

    }

  if(anyFacetActive())h+=`<button class="facet-reset" onclick="clearFacets()">× сбросить фильтры</button>`;
  return h+`</div>`;
}

// Arabic text normalization for search
const AR_DIACRITICS=/[ؐ-ًؚ-ٰٟۖ-ۜ۟-۪ۨ-ۭ࣓-ࣿ]/g;
const AR_TATWEEL=/\u0640/g; // Kashida/Tatweel

function normalizeArabic(s){
  return s
    .replace(AR_DIACRITICS,"")   // remove tashkeel
    .replace(AR_TATWEEL,"")      // remove tatweel/kashida
    .replace(/[أإآٱ]/g,"ا")  // alif forms -> alif
    .replace(/ة/g,"ه")                      // ta marbuta -> ha
    .replace(/ى/g,"ي");                     // alif maqsura -> ya
}

function normalizeSearch(s){return normalizeArabic(s).toLowerCase().trim();}

// Arabic Quran-text variants (kind:quran) — rendered as the main Arabic column(s), in config order
function getEnabledQuranTexts(){return CONFIG.tafsirs.filter(t=>t.kind==="quran"&&ST.enabled[t.id]);}
function isQuranText(id){const t=CONFIG.tafsirs.find(x=>x.id===id);return t&&t.kind==="quran";}

function getEnabledList(){
  let uo=getUserOrder();
  const allTafsirs=[];
  const allIds=new Set();

  // Collect enabled tafsirs/translations (Quran-text variants are handled separately)
  CONFIG.groups.forEach(g=>{
    CONFIG.tafsirs.filter(t=>t.group===g.id&&t.kind!=="quran"&&t.kind!=="image").forEach(t=>{
      if(ST.enabled[t.id]){allTafsirs.push(t);allIds.add(t.id);}
    });
  });
  if(ST.enabled._notes){allTafsirs.push({id:"_notes",name:"Мои заметки"});allIds.add("_notes");}

  if(uo.length){
    // Clean stale IDs (removed from config or disabled)
    uo=uo.filter(id=>allIds.has(id));
    // Find new IDs not in userOrder — append at end
    const newIds=[];
    allTafsirs.forEach(t=>{if(!uo.includes(t.id))newIds.push(t.id);});
    if(newIds.length){uo=uo.concat(newIds);setUserOrder(uo);}

    // Build ordered list
    const ordered=[];
    uo.forEach(id=>{const t=allTafsirs.find(x=>x.id===id);if(t)ordered.push(t);});
    return ordered;
  }
  return allTafsirs;
}

function moveEnabled(id,dir){
  const list=getEnabledList().map(t=>t.id);
  const idx=list.indexOf(id);
  if(idx<0)return;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=list.length)return;
  [list[idx],list[newIdx]]=[list[newIdx],list[idx]];
  setUserOrder(list);
  renderRP();
  renderCenter();
}

let searchTimer=null;
let searchOpen=false;

function toggleSearch(){
  searchOpen=!searchOpen;
  const panel=document.getElementById("searchPanel");
  panel.classList.toggle("hidden",!searchOpen);
  if(searchOpen){
    document.getElementById("spInput").value="";
    document.getElementById("spInput").focus();
    document.getElementById("spResults").innerHTML=`<div class="sp-status">Введите запрос (минимум 2 символа)</div>`;
    document.getElementById("spCount").classList.add("hidden");
    pushOverlay();
  }else consumeOverlay();

function onSearchInput(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(doSearch,400);

async function doSearch(){
  const raw=document.getElementById("spInput").value;
  const query=normalizeSearch(raw);
  const resultsEl=document.getElementById("spResults");
  const countEl=document.getElementById("spCount");

  if(query.length<2){
    resultsEl.innerHTML=`<div class="sp-status">Введите минимум 2 символа</div>`;
    countEl.classList.add("hidden");
    return;
  }

  resultsEl.innerHTML=`<div class="sp-status">Поиск...</div>`;

  const searchAll=document.getElementById("spAllTafsirs")?.checked;

  // Determine which tafsirs to search
  let toSearch=[];
  if(searchAll){
    toSearch=CONFIG.tafsirs.slice();
  } else {
    CONFIG.groups.forEach(g=>{
      CONFIG.tafsirs.filter(t=>t.group===g.id).forEach(t=>{
        if(ST.enabled[t.id])toSearch.push(t);
      });
    });
  }

  // Also search in built-in ayah translations
  const results=[];
  const MAX=100;

  // Query words (>=2 chars) for the inverted index (AND across tokens, substring on words)
  const tokens=(query.match(/[\p{L}\p{N}_]+/gu)||[]).filter(w=>w.length>=2);

  for(const t of toSearch){
    if(results.length>=MAX)break;
    const idx=tokens.length?await loadIndex(t.id):null;
    let refs=null; // Set of "s:a" satisfying ALL tokens — null means "no index, fall back"
    if(idx){
      for(const tok of tokens){
        const set=new Set();
        for(const w in idx){if(w.includes(tok))for(const ref of idx[w].split(" "))set.add(ref);}
        if(refs===null)refs=set; else for(const r of [...refs])if(!set.has(r))refs.delete(r);
        if(refs.size===0)break;
      }
    }
    if(refs!==null){
      // Index hit: pull display text only for matched ayahs, grouped by surah (chunked)
      const bySurah={};
      for(const ref of refs){const c=ref.indexOf(":");(bySurah[ref.slice(0,c)]=bySurah[ref.slice(0,c)]||[]).push(ref.slice(c+1));}
      for(const sid of Object.keys(bySurah).sort((a,b)=>+a-+b)){
        if(results.length>=MAX)break;
        const chunk=await loadChunk(t.id,+sid);
        for(const aid of bySurah[sid].sort((a,b)=>+a-+b)){
          if(results.length>=MAX)break;
          const text=chunk[aid];if(!text)continue;
          results.push({surah:+sid,ayah:+aid,text,source:t.name,sourceAr:t.nameAr,lang:t.lang,tafsirId:t.id});
        }
      }
    }else{
      // No index — fall back to full-text scan
      const data=await loadWhole(t.id);
      if(!data)continue;
      for(const sid in data){
        if(results.length>=MAX)break;
        const surahData=data[sid];
        for(const aid in surahData){
          if(results.length>=MAX)break;
          if(normalizeSearch(surahData[aid]).includes(query)){
            results.push({surah:+sid,ayah:+aid,text:surahData[aid],source:t.name,sourceAr:t.nameAr,lang:t.lang,tafsirId:t.id});
          }
        }
      }
    }
  }

  // Also search user notes
  const notes=getNotes();
  for(const k in notes){
    if(results.length>=MAX)break;
    const normalized=normalizeSearch(notes[k]);
    if(normalized.includes(query)){
      const[s,a]=k.split(":");
      results.push({surah:+s,ayah:+a,text:notes[k],source:"📝 Мои заметки",lang:"ru"});
    }
  }

  countEl.textContent=`Найдено: ${results.length}${results.length>=MAX?' (показаны первые '+MAX+')':''}`;
  countEl.classList.remove("hidden");

  if(!results.length){
    resultsEl.innerHTML=`<div class="sp-status">Ничего не найдено</div>`;
    return;
  }

  // Render results with highlighting
  resultsEl.innerHTML=results.map(r=>{
    const su=SURAHS.find(s=>s.id===r.surah);
    const suName=su?su.ru:`Сура ${r.surah}`;
    const isAr=r.lang==="ar";

    // Get a snippet around the match
    let snippet=r.text;
    const nText=normalizeSearch(snippet);
    const matchPos=nText.indexOf(query);
    if(snippet.length>300&&matchPos>=0){
      const start=Math.max(0,matchPos-80);
      const end=Math.min(snippet.length,matchPos+query.length+120);
      snippet=(start>0?'...':'')+snippet.substring(start,end)+(end<snippet.length?'...':'');
    }

    // Highlight matches (approximate — highlight in original based on normalized position)
    const highlightedSnippet=highlightMatch(snippet,query);

    return `<div class="sp-result" onclick="goSearchResult(${r.surah},${r.ayah})">
      <div class="sp-ref">${suName} : ${r.ayah}</div>
      <div class="sp-src">${esc(r.source)} ${r.sourceAr?'<span style="font-family:Amiri;direction:rtl">'+r.sourceAr+'</span>':''}</div>
      <div class="sp-text ${isAr?'rtl':''}">${highlightedSnippet}</div>
    </div>`;
  }).join("");
}

function highlightMatch(text,query){
  const orig=text;
  const norm=normalizeArabic(orig).toLowerCase();

  // Build map: normalized index → original index
  const map=[];
  for(let oi=0;oi<orig.length;oi++){
    const normalized=normalizeArabic(orig[oi]).toLowerCase();
    for(let k=0;k<normalized.length;k++) map.push(oi);
  }
  map.push(orig.length); // sentinel

  // Find all matches in normalized text
  const matches=[];
  let pos=norm.indexOf(query);
  while(pos>=0){
    const origStart=map[pos]!==undefined?map[pos]:0;
    const normEnd=pos+query.length;
    const origEnd=normEnd<map.length?map[normEnd]:orig.length;
    matches.push([origStart,origEnd]);
    pos=norm.indexOf(query,normEnd);
  }

  if(!matches.length)return esc(orig);

  const parts=[];
  let last=0;
  for(const[s,e]of matches){
    if(s>last)parts.push(esc(orig.substring(last,s)));
    parts.push('<span class="sp-hl">'+esc(orig.substring(s,e))+'</span>');
    last=e;
  }
  if(last<orig.length)parts.push(esc(orig.substring(last)));
  return parts.join("");
}

function pushSurahHash(id){const h="#"+id;if(location.hash!==h)history.pushState({surah:id},"",h);}
function applyHash(initial){

  if(!m)return false;

function ntScrollEl(){return document.getElementById("readingArea")||document.querySelector(".mushaf-shell");}
let _ntHoldT=null,_ntRAF=null,_ntMoved=false;
function ntStopScroll(){if(_ntHoldT){clearTimeout(_ntHoldT);_ntHoldT=null;}if(_ntRAF){cancelAnimationFrame(_ntRAF);_ntRAF=null;}}
function bindNoTouchScroll(panel){
  panel.querySelectorAll(".nt-scroll").forEach(b=>{
    const dir=+b.dataset.dir;
    b.addEventListener("pointerdown",e=>{
      e.preventDefault();_ntMoved=false;
      _ntHoldT=setTimeout(()=>{               // удержание → плавная непрерывная прокрутка
        _ntMoved=true;
        const loop=()=>{const sc=ntScrollEl();if(sc)sc.scrollTop+=dir*10;_ntRAF=requestAnimationFrame(loop);};loop();
      },280);
    });
    const end=()=>{
      const moved=_ntMoved;ntStopScroll();_ntMoved=false;
      if(!moved){const sc=ntScrollEl();if(sc)sc.scrollBy({top:dir*Math.round(sc.clientHeight*0.85),behavior:"smooth"});} // одиночный тап ≈ экран
    };
    b.addEventListener("pointerup",end);
    b.addEventListener("pointercancel",ntStopScroll);
    b.addEventListener("pointerleave",()=>{if(_ntMoved)ntStopScroll();});
  });
}
function bumpView(key,dir){

// --- 📑 Переход: jump by surah / juz / rub al-hizb / page (both modes) -------
function juzForPage(pg){
  const js=qpcMeta&&qpcMeta.juzStart;if(!js)return null;
  let cur=1;for(let j=1;j<=30;j++){if(js[j]&&js[j].page<=pg)cur=j;else break;}return cur;
}
// Hizb (60) derives from the rub al-hizb index (4 rubs per hizb): hizb h → rub (h-1)*4+1
function hizbStart(h){const r=qpcMeta&&qpcMeta.rubStart;return r?r[(h-1)*4+1]||null:null;}
function hizbForPage(pg){let cur=1;for(let h=1;h<=60;h++){const s=hizbStart(h);if(s&&s.page<=pg)cur=h;else break;}return cur;}
function pageLocation(pg){
  const total=qpcMeta&&qpcMeta.pages||604;
  const pf=qpcMeta&&qpcMeta.pageStart&&qpcMeta.pageStart[pg];
  const su=pf?SURAHS.find(s=>s.id===pf.surah):null;
  const juz=juzForPage(pg);
  return `${su?esc(su.ru):"Мусхаф"}${juz?` · Джуз ${juz}`:""} · стр. ${pg}/${total}`;
}
function goAyah(surah,ayah){
  ST.surah=surah;ST.selectedTag=null;ST.scrollToAyah=ayah||1;
  if(isM()){ST.sidebarOpen=false;document.getElementById("sidebar").classList.add("collapsed");}
  pushSurahHash(surah);render();
}
function jumpTo(t){ // {page?, surah?, ayah?}
  // resolve a page for EVERY jump and keep ST.mushafPage as the position of
  // record in both modes — otherwise prev/next loses where we are within a
  // surah and juz/hizb/page stepping gets stuck
  let pg=t.page;
  if(pg==null&&t.surah){const st=qpcMeta&&qpcMeta.surahStart&&qpcMeta.surahStart[t.surah];pg=st?st.page:1;}
  if(pg!=null)ST.mushafPage=pg;
  if(ST.pageMode){
    gotoPage(pg||1);
  }else{
    if(t.surah)goAyah(t.surah,t.ayah||1);
    else if(t.page){const pf=qpcMeta&&qpcMeta.pageStart&&qpcMeta.pageStart[t.page];if(pf)goAyah(pf.surah,pf.ayah);}
  }
}
function navJumpSurah(v){jumpTo({surah:+v});}
function navJumpJuz(v){const j=qpcMeta&&qpcMeta.juzStart&&qpcMeta.juzStart[+v];if(j)jumpTo(j);}
function navJumpHizb(v){const s=hizbStart(Math.max(1,Math.min(60,+v||1)));if(s)jumpTo(s);}
function navJumpPage(v){const total=qpcMeta&&qpcMeta.pages||604;v=Math.max(1,Math.min(total,+v||1));jumpTo({page:v});}
// Switch reading mode (Аяты ↔ Мусхаф); keeps your place via togglePageMode.
function setReadMode(toPage){if(!!ST.pageMode!==!!toPage)togglePageMode();}
// Three-way reading mode: 'ayat' | 'words' (пословный) | 'page' (мусхаф).
function setMode(mode){
  ST.bookIntro=false;
  if(mode==="source"){                         // 4-й режим «Источник» (чтение по покрытию)
    ST.srcMode=true;ST.wbwMode=false;ss("wbwMode",false);ST.pageMode=false;
    renderCB();renderBottomNav();renderSB();renderCenter();return;
  }
  ST.srcMode=false;                            // выход из режима источника при выборе другого
  if(mode==="page"){ if(!ST.pageMode){ST.wbwMode=false;ss("wbwMode",false);togglePageMode();}else{renderSB();} return; }
  // 'ayat' or 'words': both live outside page mode
  ST.wbwMode=(mode==="words");ss("wbwMode",ST.wbwMode);
  if(ST.pageMode){togglePageMode();renderSB();return;} // leaving page mode re-renders for us
  renderCB();renderBottomNav();renderSB();renderCenter();
}

// --- bottom prev/next navigation by a chosen unit (+ swipe) ------------------
function curPos(){
  const page=ST.mushafPage||1; // tracked on every jump (both modes)
  const surah=ST.pageMode?((qpcMeta&&qpcMeta.pageStart&&qpcMeta.pageStart[page]||{}).surah||1):ST.surah;
  return {page,surah,juz:juzForPage(page)||1,hizb:hizbForPage(page)||1};
}
function setNavUnit(u){ST.navUnit=u;ss("navUnit",u);renderBottomNav();}
function navJumpValue(v){
  if(v==="intro"){openBookIntro();return;}                              // «§ Введение» — мукаддима книги
  if(typeof v==="string"&&v[0]==="j"){navJumpJuz(+v.slice(1));return;}  // «▸ Джуз N» из объединённого пикера
  const u=ST.navUnit;
  if(u==="surah")navJumpSurah(v);else if(u==="page")navJumpPage(v);
  else if(u==="juz")navJumpJuz(v);else navJumpHizb(v);}
// In mushaf mode only one page is shown, so the arrows always flip PAGES
// regardless of the picker unit; the picker is for jumping to a surah/juz/etc.
function stepUnit(){return ST.pageMode?"page":ST.navUnit;}
function stepSection(dir){
  const p=curPos(),u=stepUnit();
  if(u==="surah")jumpTo({surah:Math.max(1,Math.min(114,p.surah+dir))});
  else if(u==="page")navJumpPage(p.page+dir);
  else if(u==="juz")navJumpJuz(Math.max(1,Math.min(30,p.juz+dir)));
  else navJumpHizb(Math.max(1,Math.min(60,p.hizb+dir)));
}
// One unified navigation bar (both modes): step unit + a full picker list of
// that unit + prev/next arrows. All four units always available.
function renderBottomNav(){
  const el=document.getElementById("bottomNav");if(!el)return;
  ntStopScroll();                                    // на всякий случай гасим непрерывную прокрутку
  el.className="bottom-nav";el.style.height="";       // сброс к обычному виду
  if(ST.selectedTag){el.style.display="none";return;}
  el.style.display="flex";
  if(ST.noTouch){                                     // кнопочная панель вне области текста
    el.classList.add("notouch-nav");el.style.height=(ST.ntH||60)+"px";
    el.innerHTML=
      `<button class="nt-btn nt-side" onclick="stepSection(-1)" title="Предыдущий раздел/страница">‹ пред.</button>`+
      `<button class="nt-btn nt-scroll" data-dir="-1" title="Вверх (тап — экран, удержание — плавно)">▲</button>`+
      `<button class="nt-btn nt-scroll" data-dir="1" title="Вниз (тап — экран, удержание — плавно)">▼</button>`+
      `<button class="nt-btn nt-side" onclick="stepSection(1)" title="Следующий раздел/страница">след. ›</button>`;
    bindNoTouchScroll(el);
    return;
  }
  const p=curPos(),u=ST.navUnit,total=qpcMeta&&qpcMeta.pages||604;
  const units=[["surah","Сура"],["page","Страница"],["juz","Джуз"],["hizb","Хизб"]];
  const unitSel=`<select class="bn-unit" onchange="setNavUnit(this.value)" title="Что листать">`+
    units.map(([v,n])=>`<option value="${v}" ${v===u?"selected":""}>${n}</option>`).join("")+`</select>`;
  let opts,idx,max;
  if(u==="surah"){
    const opt=s=>{const nosrc=ST.srcMode&&ST.srcSel&&!covPairs(ST.srcSel,s.id);return`<option value="${s.id}" ${s.id===p.surah?"selected":""}>${s.id}. ${esc(s.ru)}${nosrc?" ∅":""}</option>`;};
    const introOpt=booksWithMuqaddima().length?`<option value="intro" ${ST.bookIntro?"selected":""}>§ Введение (المقدمة)</option>`:"";
    if(qpcMeta){ // объединённый пикер: «▸ Джуз N (начало)» как ссылка + суры джуза, в мусхафной очередности
      let o=introOpt;
      for(let J=1;J<=30;J++){
        const sin=SURAHS.filter(s=>juzOfSurah(s.id)===J);
        const js=qpcMeta.juzStart[J];const su=js&&SURAHS.find(x=>x.id===js.surah);
        const ref=su?` — ${esc(su.ru)}${js.ayah>1?" : "+js.ayah:""}`:"";
        o+=`<optgroup label="Джуз ${J}">`
          +`<option value="j${J}">▸ Джуз ${J} (начало)${ref}</option>`
          +sin.map(opt).join("")+`</optgroup>`;
      }
      opts=o;
    }else opts=introOpt+SURAHS.map(opt).join("");
    idx=p.surah;max=114;
  }
  else if(u==="page"){opts=Array.from({length:total},(_,i)=>`<option value="${i+1}" ${i+1===p.page?"selected":""}>Страница ${i+1}</option>`).join("");idx=p.page;max=total;}
  else if(u==="juz"){opts=Array.from({length:30},(_,i)=>`<option value="${i+1}" ${i+1===p.juz?"selected":""}>Джуз ${i+1}</option>`).join("");idx=p.juz;max=30;}
  else{opts=Array.from({length:60},(_,i)=>`<option value="${i+1}" ${i+1===p.hizb?"selected":""}>Хизб ${i+1}</option>`).join("");idx=p.hizb;max=60;}
  const valSel=`<select class="bn-val" onchange="navJumpValue(this.value)">${opts}</select>`;
  // arrow bounds follow the STEP unit (page in mushaf mode), not the picker
  const su=stepUnit();
  const aidx=su==="surah"?p.surah:su==="page"?p.page:su==="juz"?p.juz:p.hizb;
  const amax=su==="surah"?114:su==="page"?total:su==="juz"?30:60;
  const tip=su==="page"?"страница":su==="surah"?"сура":su==="juz"?"джуз":"хизб";
  el.innerHTML=`<button class="bn-arrow" onclick="stepSection(-1)" ${aidx<=1?"disabled":""} title="Предыдущая ${tip}">‹</button>`+
    `<span class="bn-mid">${unitSel}${valSel}</span>`+
    `<button class="bn-arrow" onclick="stepSection(1)" ${aidx>=amax?"disabled":""} title="Следующая ${tip}">›</button>`;
}
// horizontal swipe on the reading area → prev/next section (skip column layout's
// own horizontal scrolling)
let _swipeX=0,_swipeY=0,_swipeOk=false;
function setupSwipe(){
  const c=document.getElementById("centerBody");if(!c)return;
  c.addEventListener("touchstart",e=>{const t=e.changedTouches[0];_swipeX=t.clientX;_swipeY=t.clientY;
    _swipeOk=!ST.noTouch&&!(!ST.pageMode&&ST.layout==="v"&&!isM());},{passive:true});
  c.addEventListener("touchend",e=>{
    if(!_swipeOk)return;const t=e.changedTouches[0];const dx=t.clientX-_swipeX,dy=t.clientY-_swipeY;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5)stepSection(dx<0?1:-1); // swipe left → next
  },{passive:true});
}

// --- Mushaf packs: page-based glyph fonts (e.g. QPC v1) ---------------------
// A "pack" renders each word as a Private Use Area glyph that only displays with
// that page's own font. Registry is extensible: add Indopak / Warsh / v2 here.
const PACKS={
  // dataDir/pageDir/meta/fontFile — ОТНОСИТЕЛЬНАЯ структура пакета (внутри хранилища);
  // конечный URL собирает resolveUrl (база — из SOURCES.mushaf_glyphs / mushaf_fonts).
  qpc1:{id:"qpc1",type:"page-font",dataDir:"qpc/v1/surah",pageDir:"qpc/v1/page",meta:"qpc/v1/meta.json",
    fontFamily:p=>`qpc1-p${p}`,fontFile:p=>`qpc-v1/p${p}.woff2`}
};
function activePack(){return PACKS[ST.arFont]||null;}
// Lazily inject one @font-face per page the first time that page is shown.
const _packFontsLoaded=new Set();
function ensurePageFont(pack,page){
  const key=pack.id+":"+page;
  if(_packFontsLoaded.has(key))return;
  _packFontsLoaded.add(key);
  const st=document.createElement("style");
  st.textContent=`@font-face{font-family:'${pack.fontFamily(page)}';src:url('${resolveUrl("mushaf_fonts",{path:pack.fontFile(page)})}') format('woff2');font-display:swap}`;
  document.head.appendChild(st);
}
// Per-surah glyph data: {ayah:{"w":[[glyph,page],...],"e":[glyph,page]|null}}
const qpcCache={};
async function loadPackSurah(packId,surah){
  const k=packId+"|"+surah;
  if(qpcCache[k]!==undefined)return qpcCache[k];
  const pack=PACKS[packId];
  try{const r=await fetch(resolveUrl("mushaf_glyphs",{path:`${pack.dataDir}/${surah}.json`}));qpcCache[k]=r.ok?await r.json():null;}
  catch(e){qpcCache[k]=null;}
  return qpcCache[k];
}
// Build the glyph HTML for one ayah; words stay individually selectable.
// When loc ("surah:ayah") is given, each word carries data-loc="surah:ayah:pos"
// so tapping it opens the corpus grammar card (positions are aligned 1:1).
function renderPackAyah(pack,entry,loc){
  if(!entry)return "";
  let html="";
  entry.w.forEach((wp,i)=>{const g=wp[0],p=wp[1];ensurePageFont(pack,p);
    const dl=loc?` data-loc="${loc}:${i+1}"`:"";
    html+=`<span class="qpc-w"${dl} style="font-family:'${pack.fontFamily(p)}'">${g}</span> `;});
  if(entry.e){const g=entry.e[0],p=entry.e[1];ensurePageFont(pack,p);html+=`<span class="qpc-end" style="font-family:'${pack.fontFamily(p)}'">${g}</span>`;}
  return `<div class="qpc-line selectable">${html}</div>`;
}

let qpcMeta=null;
let mushafResizeObs=null; // re-fits line scaling when the column width changes
async function loadQpcMeta(){

// One physical mushaf line of glyphs. The glyphs carry no kashida, so a line at
// a single size only fills ~80-95% of the column; instead of stretching the
// SPACES (which makes "rivers"), fitMushafLines() scales each line's font-size up
// to fill the column — words stay dense, spaces normal. Surah-end / framed lines
// are centered and left unscaled.
function mushafGlyphLine(pack,words,centered){
  let h="";for(const wp of words){const g=wp[0],p=wp[1];ensurePageFont(pack,p);h+=`<span class="qpc-w" style="font-family:'${pack.fontFamily(p)}'">${g}</span> `;}
  return `<div class="m-line${centered?' m-line-c':''} selectable"><span class="m-inner">${h}</span></div>`;
}
// Uniform page fit: every line on a page is scaled by the SAME factor, so all
// glyphs are one size (no per-line "ballooning"). The factor is chosen so the
// widest line exactly fills the column; shorter lines stay narrower and are
// centered. Shrink (narrow screens) is uncapped; growth is capped so a page of
// short lines doesn't balloon. Recomputed from the live column width on resize.
const MUSHAF_MAX_FIT=1.5;
const MUSHAF_FIT_SAFE=0.99; // keep final width strictly inside the column
function fitMushafLines(host){
  const lines=host.querySelectorAll(".m-line:not(.m-empty)");
  // reset to the CSS base size first, so we measure true natural widths under
  // the CURRENT column width — never a previously-scaled value
  for(const ln of lines)ln.style.fontSize="";
  void host.offsetWidth; // force one reflow before measuring
  // the widest (tightest) line dictates the single page-wide scale
  let minRatio=Infinity;
  for(const ln of lines){
    const inner=ln.querySelector(".m-inner");if(!inner)continue;
    const colW=ln.clientWidth, natW=inner.scrollWidth;
    if(!colW||!natW)continue;
    minRatio=Math.min(minRatio,colW/natW);
  }
  if(!isFinite(minRatio))return;
  const scale=Math.min(minRatio,MUSHAF_MAX_FIT)*MUSHAF_FIT_SAFE;
  for(const ln of lines){
    const base=parseFloat(getComputedStyle(ln).fontSize);
    ln.style.fontSize=(base*scale)+"px"; // same kegl for every line on the page
  }
}
async function renderMushafPage(el){
  const pack=PACKS.qpc1;
  const meta=await loadQpcMeta();const total=meta?.pages||604;
  let pg=Math.max(1,Math.min(total,ST.mushafPage||1));ST.mushafPage=pg;
  el.innerHTML=`<div class="mushaf-shell"><div id="mushafPage" class="mushaf-page"><div style="text-align:center;color:var(--text-muted);padding:40px">Загрузка страницы ${pg}…</div></div></div>`;
  const data=await loadQpcPage(pg);
  const host=document.getElementById("mushafPage");if(!host)return;
  if(!data){host.innerHTML=`<div style="padding:40px;text-align:center;color:var(--text-muted)">Нет данных для страницы ${pg}</div>`;}
  else{
    // header & basmala occupy their own lines above each surah's first ayah line
    const headerAt={},basmalaAt={};
    for(const s of (data.starts||[])){
      const hasB=s.surah!==1&&s.surah!==9;
      const hl=s.line-(hasB?2:1);if(hl>=1)headerAt[hl]=s.surah;
      if(hasB&&s.line-1>=1)basmalaAt[s.line-1]=s.surah;
    }
    const centerSet=new Set(data.center||[]);
    const framed=pg<=2; // first two pages are decorative/framed → centered, not justified
    let html="";
    for(let ln=1;ln<=15;ln++){
      if(headerAt[ln]!=null){
        const su=SURAHS.find(x=>x.id===headerAt[ln]);
        html+=`<div class="m-surah-head"><span class="m-surah-name">سورة ${su?su.name:''}</span></div>`;
      }else if(basmalaAt[ln]!=null){
        html+=`<div class="m-basmala">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>`;
      }else if(data.lines[String(ln)]){
        html+=mushafGlyphLine(pack,data.lines[String(ln)],framed||centerSet.has(ln));
      }else{
        html+=`<div class="m-line m-empty"></div>`;
      }
    }
    host.innerHTML=html;
    // measure & fit only after the page glyph font is actually loaded
    try{await document.fonts.ready;}catch(e){}
    fitMushafLines(host);
    // re-fit when the column width changes (orientation / window resize), so the
    // scale always matches the CURRENT column and never overflows
    if(mushafResizeObs){mushafResizeObs.disconnect();mushafResizeObs=null;}
    let lastFitW=host.clientWidth;
    mushafResizeObs=new ResizeObserver(()=>{
      if(!document.body.contains(host)){mushafResizeObs.disconnect();mushafResizeObs=null;return;}
      const w=host.clientWidth;
      if(Math.abs(w-lastFitW)<1)return; // ignore height-only changes
      lastFitW=w;fitMushafLines(host);
    });
    mushafResizeObs.observe(host);
  }
  // prev/next handled by the shared bottom navigation bar
}

// --- Word-by-word mode: grid of words + per-word gloss ----------------------
// Each word is a QPC glyph (reused from the per-surah pack data, aligned 1:1
// with the corpus by position) carrying data-loc="surah:ayah:word". The gloss
// shown is the VERBATIM English gloss (display-only); tapping a word opens the
// corpus grammar card (Russian). data/wbw chunks load lazily per surah.
async function renderWbw(el){

    });

    if(entry.e){ensurePageFont(pack,entry.e[1]);endG=`<span class="wbw-end" style="font-family:'${pack.fontFamily(entry.e[1])}'">${entry.e[0]}</span>`;}
    html+=`<div class="wbw-ayah" data-aid="${aid}">
      <div class="wbw-head"><span class="wbw-num">${surah}:${aid}</span></div>
      <div class="wbw-grid">${cells}${endG}</div></div>`;
  }
  html+=`<div class="wbw-attr">Русский пословный глосс — наш черновой перевод (сверка по смыслу с переводом Э. Кулиева; сам перевод Кулиева не распространяется). Английский глосс: <a href="https://github.com/hablullah/data-quran" target="_blank" rel="noopener">data-quran</a> (CC BY-NC-ND, без изменений). Грамматический разбор: <a href="http://corpus.quran.com" target="_blank" rel="noopener">Quranic Arabic Corpus</a> (GPL).</div>`;
  area.innerHTML=html;
  if(ST.scrollToAyah!=null){const t=area.querySelector(`.wbw-ayah[data-aid="${ST.scrollToAyah}"]`);if(t)t.scrollIntoView({block:"start"});ST.scrollToAyah=null;}
}

let openPopupAyah=null;

// Single source of truth for a tag-popup node (used by open + refresh)
function popupNodeHTML(node,anc,aid,current){
  const path=tagPath(anc,node.name);
  const has=node.children?.length>0;
  const isOn=current.includes(path);
  const isOpen=!collapsedG["tp_"+path];
  let h=`<div class="tp-node">
    <div class="tp-row" onclick="popupToggleTag(${aid},'${escAttr(path)}')">
      <span class="tp-arrow" onclick="event.stopPropagation();collapsedG['tp_${escAttr(path)}']=!collapsedG['tp_${escAttr(path)}'];refreshTagPopup(${aid})">${has?(isOpen?'▼':'▶'):' '}</span>
      <span class="tp-check">${isOn?'☑':'☐'}</span>
      <span style="flex:1">${esc(node.name)}</span>
    </div>`;
  if(has&&isOpen)h+=node.children.map(ch=>popupNodeHTML(ch,[...anc,node.name],aid,current)).join("");
  return h+"</div>";
}

function openTagPopup(aid,btnEl){
  if(ST.noTouch)return;
  closeTagPopup();

  if(!tree.length){alert("Создайте теги в боковой панели (☰ → Теги)");return;}

function closeOnOutside(e){
  const popup=document.getElementById("tagPopup");
  if(!popup)return;
  if(popup.contains(e.target))return;
  if(e.target.closest("[onclick*='openTagPopup']"))return;
  closeTagPopup();
}

function closeTagPopup(){
  const popup=document.getElementById("tagPopup");
  if(popup)popup.remove();
  openPopupAyah=null;
  document.removeEventListener("click",closeOnOutside);
}

// Tag management
function addTag(val){
  if(!val.trim())return;
  const parts=val.split("/").map(s=>s.trim()).filter(Boolean);
  const tree=getTagTree();let cur=tree;
  for(const p of parts){let f=cur.find(n=>n.name===p);if(!f){f={name:p,children:[]};cur.push(f);}cur=f.children;}
  setTagTree(tree);renderSB();
}
function selectTag(path){ST.selectedTag=path;ST.bookIntro=false;if(isM()){ST.sidebarOpen=false;document.getElementById("sidebar").classList.add("collapsed");}render();}
function renameTag(path){
  const parts=path.split("/");const oldName=parts[parts.length-1];
  const newName=prompt("Новое название:",oldName);
  if(!newName||!newName.trim()||newName===oldName)return;
  const tree=getTagTree();
  function findNode(arr,idx){
    const n=arr.find(x=>x.name===parts[idx]);
    if(!n)return null;
    if(idx===parts.length-1)return n;
    return findNode(n.children,idx+1);
  }
  const node=findNode(tree,0);
  if(node){
    const newPath=parts.slice(0,-1).concat(newName.trim()).join("/");
    // Update tag assignments
    const at=getAyahTags();
    for(const k in at){at[k]=at[k].map(p=>p===path?newPath:p.startsWith(path+"/")?newPath+p.slice(path.length):p);}
    setAyahTags(at);
    node.name=newName.trim();
    setTagTree(tree);
    if(ST.selectedTag===path)ST.selectedTag=newPath;
    render();
  }
}
function moveTag(path,dir){
  const parts=path.split("/");
  const tree=getTagTree();
  let arr=tree;
  for(let i=0;i<parts.length-1;i++){const n=arr.find(x=>x.name===parts[i]);if(!n)return;arr=n.children;}
  const idx=arr.findIndex(x=>x.name===parts[parts.length-1]);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=arr.length)return;
  [arr[idx],arr[newIdx]]=[arr[newIdx],arr[idx]];
  setTagTree(tree);renderSB();
}
function deleteTag(path){
  if(!confirm("Удалить «"+path+"»?"))return;
  const parts=path.split("/");const tree=getTagTree();
  let arr=tree;
  for(let i=0;i<parts.length-1;i++){const n=arr.find(x=>x.name===parts[i]);if(!n)return;arr=n.children;}
  const idx=arr.findIndex(x=>x.name===parts[parts.length-1]);
  if(idx>=0)arr.splice(idx,1);
  setTagTree(tree);
  const at=getAyahTags();for(const k in at){at[k]=at[k].filter(t=>t!==path&&!t.startsWith(path+"/"));if(!at[k].length)delete at[k];}
  setAyahTags(at);
  if(ST.selectedTag===path)ST.selectedTag=null;
  render();
}

applyArFont();

ST.noTouch=gs("noTouch",false); ST.ntH=gs("ntH",60); // «Режим без касания»
if(ST.noTouch&&ST.wbwMode){ST.wbwMode=false;ss("wbwMode",false);} // «Слова» недоступен в режиме без касания
applyNoTouch();

// Keep immersive state in sync if the user leaves browser fullscreen via Esc/F11/gesture.
// (⛶ всегда доступна: иммерсивный режим работает без Fullscreen API, в т.ч. на iOS)
document.addEventListener("fullscreenchange",onFsChange);
document.addEventListener("webkitfullscreenchange",onFsChange);
// word/grammar cards: open on tap of a [[…]] word OR a word with data-loc
// (corpus card), dismiss on outside tap/scroll
document.addEventListener("click",e=>{
  if(ST.noTouch)return;                              // режим без касания: точечные действия по тексту отключены
  if(!(e.target.closest))return;
  // a word carrying an address → grammar card from the corpus (lazy-loaded).
  // skip when the user is selecting text so copying isn't interrupted.
  const loc=e.target.closest("[data-loc]");
  if(loc&&(window.getSelection?window.getSelection().isCollapsed:true)){openMorphCard(loc);return;}
  const w=e.target.closest(".wcard");
  if(w){showWordCard(w);return;}
  if(!e.target.closest("#wordCard"))hideWordCard();
});
document.addEventListener("scroll",hideWordCard,true);
document.addEventListener("scroll",saveLastPosSoon,true);  // обновлять последнюю позицию по мере чтения
// Open sidebar by default on desktop
if(!isM()){ST.sidebarOpen=true;document.getElementById("sidebar").classList.remove("collapsed");}
loadConfig();
